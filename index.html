// original title music: the 11:46 -> 11:56 segment of title.mp3, played twice then a ~20s gap, looping

titleAudio.addEventListener("timeupdate", () => {

// schedule one full pass of the anthem starting at audio-clock time `startAt`; returns its length (s)
function scheduleTitleTune(startAt) {
  let t = startAt;

  if (e.key.toLowerCase() === "f") { toggleFullscreen(); return; }

  if (e.key.toLowerCase() === "t") { lang = lang === "ru" ? "en" : "ru"; return; }
  // options menu (works in any state)
  if (e.key.toLowerCase() === "o") { optionsOpen = !optionsOpen; return; }
  if (optionsOpen && (e.key === "1" || e.key === "2" || e.key === "3")) {
    difficulty = { "1": "easy", "2": "original", "3": "hard" }[e.key];
    return;
  }
  // options: rocket selection (8 = Vostok/R-7 default, 9 = N1 Moon rocket)
  if (optionsOpen && (e.key === "8" || e.key === "9")) {
    rocketType = e.key === "8" ? "vostok" : "n1";
    return;
  }
  // options: music source — one switch for everything (4 = original recordings, 5 = synth)
  if (optionsOpen && (e.key === "4" || e.key === "5")) {
    const m = e.key === "4" ? 1 : 2;
    if (m !== musicMode) {
      musicMode = m;
      if (onTitle) { stopTitleMusic(); startTitleMusic(); }                 // swap the title theme live
      else if (!anthemActive) { bgm.pause(); stopMoonSynth(); startBgm(); } // swap gameplay music live
    }
    return;
  }
  // Escape returns to the title menu from anywhere
  if (e.key === "Escape") {
    onTitle = true; intro = false; launching = false;
    alarm.pause(); stopBgm(); stopSsbSynth(); anthem.pause(); usAnthem.pause(); stopIntroSounds();
    if (anthemActive) { anthemActive = false; if (masterGain) masterGain.gain.value = 0.6; }
    startTitleMusic();
    return;
  }
  // title screen: Enter begins the Earth launch
  if (onTitle) {
    if (e.key === "Enter") { onTitle = false; stopTitleMusic(); resumeAudio(); startBgm(); startLaunch(); }
    else startTitleMusic();   // any other key on the title starts/keeps the title music
    return;
  }
  // launch phase: arrows/space fly the rocket; A self-destructs; Enter skips / retries
  if (launching) {
    keys[e.key.toLowerCase()] = true;
    if (e.key.toLowerCase() === "a" && (rocket.phase === "fly" || rocket.phase === "raise")) launchCrash("SELF-DESTRUCT");
    if (e.key.toLowerCase() === "x" && !e.repeat && rocket.phase === "fly") stageLaunch();
    if (e.key === "Enter") {
      if (rocket.phase === "raise") { rocket.phase = "fly"; rocket.angle = 0; try { countdown.pause(); } catch (e2) {} }
      else if (rocket.phase === "crashed") { if (homecoming) startHomecoming(homecoming); else startLaunch(); }
      else if (rocket.phase === "landed" && homecoming) { anthem.pause(); usAnthem.pause(); stopSsbSynth(); stopAllMigEngines(); launching = false; homecoming = null; onTitle = true; startTitleMusic(); }   // homecoming win -> title
      else if (rocket.phase === "landed") { anthem.pause(); usAnthem.pause(); stopSsbSynth(); stopAllMigEngines(); startBgm(); startLaunch(); }
      else { launching = false; intro = true; introStart = performance.now(); introStaged = false; introNosed = false; introFlashed = false; introRocketSnd = introRocketDone = introLanderSnd = introLanderDone = false; try { rocketEngine.pause(); rocketEngine.volume = 0; } catch (e) {} if (audioReady && thrustGain) thrustGain.gain.setTargetAtTime(0, audio.currentTime, 0.02); }
    }
    return;
  }
  // during the intro: Enter skips straight into the game
  if (intro) {
    if (e.key === "Enter") { stopIntroSounds(); intro = false; newGame(false); }
    return;
  }
  resumeAudio();
  keys[e.key.toLowerCase()] = true;
  // Moon->Earth climb: fly with arrows/space; A self-destructs; Enter retries after a crash
  if (state === "soyuzclimb") {
    if (e.key === "Enter" && moonClimb.phase === "crashed") startMoonClimb();
    if (e.key.toLowerCase() === "a" && moonClimb.phase === "fly") moonClimbCrash("SELF-DESTRUCT");
    return;
  }
  // return cutscene: once it finishes, choose how to come home
  if (state === "docked") {
    if (clamp((performance.now() - returnStart) / RETURN_DUR, 0, 1) >= 1) {
      if (e.key === "ArrowLeft") startHomecoming("hero");
      else if (e.key === "ArrowRight") startHomecoming("millionaire");
    }
    return;
  }
  if (e.key === "Enter") {
    if (state === "landed") startAscent();
    else if (state === "crashed" && crashedInAscent && difficulty === "easy") respawnAscent();
    else newGame();
  }
  if (e.key.toLowerCase() === "x" && state === "play" && awaitingUndock) releaseFromSoyuz();
  if (e.key.toLowerCase() === "a") abort();
});
window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });
window.addEventListener("pointerdown", () => { if (onTitle) startTitleMusic(); });


// --- Fullscreen (press F): scale the fixed 900x640 canvas up to fill the screen (letterboxed) ---
const wrap = document.getElementById("wrap");
function fitCanvas() {
  if (document.fullscreenElement) {
    const sc = Math.min(window.innerWidth / W, window.innerHeight / H);
    canvas.style.width = Math.round(W * sc) + "px"; canvas.style.height = Math.round(H * sc) + "px";
  } else { canvas.style.width = ""; canvas.style.height = ""; }
}
function toggleFullscreen() {
  if (!document.fullscreenElement) { (wrap.requestFullscreen ? wrap.requestFullscreen() : wrap.webkitRequestFullscreen && wrap.webkitRequestFullscreen()); }
  else { document.exitFullscreen ? document.exitFullscreen() : document.webkitExitFullscreen && document.webkitExitFullscreen(); }
}
document.addEventListener("fullscreenchange", fitCanvas);
window.addEventListener("resize", fitCanvas);

// --- Update ---
let last = performance.now();
function loop(now) {
  let dt = (now - last) / 1000; last = now;
  if (dt > 0.05) dt = 0.05;
  update(dt); render(); drawControlsHint(); drawOptions();
  requestAnimationFrame(loop);
}

// Controls hint, drawn ON the canvas (bottom-centre) so it scales cleanly in fullscreen and never
// fights the HTML layout. Sits below the lower-left credit, with a fitted dark backing for legibility.
function drawControlsHint() {
  const txt = "←/→ ROTATE  ·  ↑/SPACE THRUST  ·  X SEPARATE  ·  A ABORT  ·  M MUTE  ·  O OPTIONS  ·  T TRANSLATE  ·  F FULLSCREEN  ·  ESC MENU";
  ctx.save();
  ctx.font = "12px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const cx = W / 2, cy = H - 13;
  ctx.shadowColor = "#0a0"; ctx.shadowBlur = 5;
  ctx.fillStyle = "#62d662";
  ctx.fillText(txt, cx, cy);
  ctx.restore();
}

// options menu (bottom-right) — opened with O. Green-themed.
function drawOptions() {
  if (!optionsOpen) return;
  ctx.save();
  const pw = 250, ph = 272, px = W - pw - 12, py = H - ph - 26;
  ctx.fillStyle = "rgba(4,12,6,0.94)"; ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = "#2faa3a"; ctx.lineWidth = 1.5; ctx.strokeRect(px, py, pw, ph);
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  ctx.fillStyle = "#5cff6a"; ctx.font = "bold 14px 'Courier New', monospace";
  ctx.fillText("OPTIONS — DIFFICULTY", px + 14, py + 12);
  const modes = [["1", "easy", "EASY"], ["2", "original", "ORIGINAL"], ["3", "hard", "HARD"]];
  ctx.font = "13px 'Courier New', monospace";
  modes.forEach((m, i) => {
    const sel = difficulty === m[1];
    ctx.fillStyle = sel ? "#7dff8a" : "#3a8a44";
    ctx.fillText((sel ? "> " : "  ") + m[0] + "  " + m[2], px + 16, py + 38 + i * 20);
  });
  ctx.fillStyle = "#5cff6a"; ctx.font = "bold 14px 'Courier New', monospace";
  ctx.fillText("ROCKET", px + 14, py + 104);
  const rkts = [["8", "vostok", "VOSTOK (R-7)"], ["9", "n1", "N1 MOON ROCKET"]];
  ctx.font = "13px 'Courier New', monospace";
  rkts.forEach((m, i) => {
    const sel = rocketType === m[1];
    ctx.fillStyle = sel ? "#7dff8a" : "#3a8a44";
    ctx.fillText((sel ? "> " : "  ") + m[0] + "  " + m[2], px + 16, py + 130 + i * 20);
  });
  ctx.fillStyle = "#5cff6a"; ctx.font = "bold 14px 'Courier New', monospace";
  ctx.fillText("MUSIC", px + 14, py + 188);
  const mus = [["4", 1, "ORIGINAL"], ["5", 2, "SYNTH"]];
  ctx.font = "13px 'Courier New', monospace";
  mus.forEach((m, i) => {
    const sel = musicMode === m[1];
    ctx.fillStyle = sel ? "#7dff8a" : "#3a8a44";
    ctx.fillText((sel ? "> " : "  ") + m[0] + "  " + m[2], px + 16, py + 214 + i * 20);
  });
  ctx.restore();
}

function update(dt) {
  if (onTitle || intro) return;
  if (launching) { updateLaunch(dt); return; }
  if (state === "soyuzclimb") { updateMoonClimb(dt); return; }
  for (const p of particles) {
    p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.kind === "smoke" ? -10 : GRAVITY * 6) * dt; p.life -= dt;
    if (p.kind === "shard") { p.rot += p.vrot * dt; p.vx *= 0.99; }
  }
  particles = particles.filter(p => p.life > 0);

  // low-fuel red alert: alarm at 200 and below
  const lowFuel = (state === "play" || state === "ascent") && fuel > 0 && fuel <= 100 && !anthemActive;
  if (lowFuel) {
    if (alarm.paused) { try { alarm.currentTime = 0; } catch (e) {} alarm.play().catch(() => {}); }
  } else if (!alarm.paused) {
    alarm.pause();
  }

  if (state !== "play" && state !== "ascent") return;

  // a small Sputnik continuously orbiting the distant Earth (vanishes behind its far side)
  {
    if (!gameSputnik) gameSputnik = { ang: rand(0, Math.PI * 2) };
    gameSputnik.ang -= dt * 0.30;   // slower (~21s/orbit); negative so the front pass reads left→right
    const o = orbitPos(EARTH.x, EARTH.y, EARTH.r + 28, EARTH.r * 0.5, -0.35, gameSputnik.ang);
    gameSputnik.x = o.x; gameSputnik.y = o.y;
    // occluded (hidden) while passing behind the globe's disc on the far side
    gameSputnik.hidden = o.behind && Math.hypot(o.x - EARTH.x, o.y - EARTH.y) < EARTH.r - 1;
  }

  // at the start you fly the docked Soyuz+lander stack; the Soyuz rides just above the lander until you press X
  if (state === "play" && awaitingUndock && soyuz) { soyuz.x = ship.x; soyuz.y = ship.y - 53; }

  // the separated Soyuz slowly drifts up to its parking orbit (SOYUZ_ALT) for the re-dock
  if (soyuzRising && soyuz) {
    soyuz.y += (SOYUZ_ALT - soyuz.y) * Math.min(1, 0.45 * dt);
    if (Math.abs(soyuz.y - SOYUZ_ALT) < 1.5) { soyuz.y = SOYUZ_ALT; soyuzRising = false; }
  }

  timeLeft = Math.max(0, timeLeft - dt);

  const shipRot = awaitingUndock ? ROTATE_SPEED * 0.5 : ROTATE_SPEED;   // the docked stack (with the Soyuz) turns slower
  if (keys["arrowleft"]) ship.angle -= shipRot * dt;
  if (keys["arrowright"]) ship.angle += shipRot * dt;

  // pre-separation the docked stack burns the Soyuz's own tank; the lander's tank stays full for the descent
  const tank = awaitingUndock ? soyuzFuel : fuel;
  const thrustHeld = (keys["arrowup"] || keys[" "]) && tank > 0;
  const target = thrustHeld ? 1 : 0;
  if (throttle < target) throttle = Math.min(target, throttle + 2.6 * dt);
  else if (throttle > target) throttle = Math.max(target, throttle - 3.9 * dt);

  let thrust = 0;
  if (throttle > 0.02 && tank > 0) {
    thrust = MAX_THRUST * throttle;
    if (awaitingUndock) { soyuzFuel -= FUEL_BURN * throttle * dt; if (soyuzFuel <= 0) { soyuzFuel = 0; throttle = 0; } }
    else { fuel -= FUEL_BURN * throttle * dt; if (fuel <= 0) { fuel = 0; throttle = 0; } }
    if (Math.random() < throttle) spawnExhaust();
  }

  if (audioReady && thrustGain) {
    const tg = (throttle > 0.02 && (awaitingUndock ? soyuzFuel : fuel) > 0) ? 0.05 + throttle * 0.22 : 0;
    thrustGain.gain.setTargetAtTime(tg, audio.currentTime, 0.05);
    thrustFilter.frequency.setTargetAtTime(300 + throttle * 700, audio.currentTime, 0.05);
  }

  // proximity beep: silent when high/far, beeps faster the closer you get to the ground
  const alt = Math.max(1, groundAt(ship.x) - ship.y);
  beepTimer -= dt;
  if (alt <= 220 && beepTimer <= 0) {
    playBeep();
    beepTimer = clamp(alt / 300, 0.12, 0.85);
  }

  const ax = Math.sin(ship.angle) * thrust;
  const ay = -Math.cos(ship.angle) * thrust + GRAVITY;
  ship.vx += ax * dt * SCALE * 3;
  ship.vy += ay * dt * SCALE * 3;
  ship.x = wrapW(ship.x + ship.vx * dt);
  ship.y += ship.vy * dt;

  const gy = groundAt(ship.x);
  if (state === "play") {
    // flying back up into the Soyuz during the descent is a full, fatal collision (not while still attached)
    if (soyuz && !awaitingUndock && soyuzCollision()) {
      const sp = Math.hypot(ship.vx, ship.vy) / SCALE;
      crashAscent("CRASHED INTO SOYUZ", true); crashedInAscent = false;
      if (sp > 50) explodeSoyuz();
    }
    else if (!awaitingUndock && checkBaseCollision()) {   // clipped a base structure: it blows up, so do you
      state = "crashed"; explosionSound(); explode(2.2); msg = "DESTROYED A MOON-BASE STRUCTURE";
      if (audioReady && thrustGain) thrustGain.gain.setTargetAtTime(0, audio.currentTime, 0.02);
    }
    else if (ship.y >= gy - 14) { ship.y = gy - 14; checkLanding(gy); }
  } else { // ascent
    soyuz.x = wrapW(soyuz.x + soyuz.vx * dt);   // barely drifting
    if (difficulty === "hard") updateAsteroid(dt);
    if (ship.y >= gy - 14) {                    // fell back and crashed
      ship.y = gy - 14;
      crashAscent("CRASHED ON ASCENT");
    } else {
      checkDocking();                           // dock (or bad-dock crash) in the port corridor
      if (state === "ascent" && soyuzCollision()) {
        const sp = Math.hypot(ship.vx, ship.vy) / SCALE;
        crashAscent("CRASHED INTO SOYUZ", true);
        if (sp > 50) explodeSoyuz();
      }
    }
  }
}

function crashAscent(message, big) {
  state = "crashed";
  crashedInAscent = true;
  if (big) {
    rocketExplosionSound(); screamSound();
    const fc = ["#ff2a10", "#ff6a20", "#ffa83a", "#ffe06a", "#fff3b0"];
    for (let i = 0; i < 170; i++) { const a = rand(0, Math.PI * 2), s = rand(60, 480); particles.push({ x: ship.x, y: ship.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40, life: rand(0.8, 2.4), kind: "boom", col: fc[(Math.random() * fc.length) | 0] }); }
    for (let i = 0; i < 30; i++) { const a = rand(0, Math.PI * 2), s = rand(30, 200); particles.push({ x: ship.x, y: ship.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(1.4, 3.0), kind: "smoke", col: "#39332d" }); }
    gameFireballs.push({ x: ship.x, y: ship.y, t: performance.now() });
  } else {
    explosionSound(); explode();
  }
  msg = message;
  if (audioReady && thrustGain) thrustGain.gain.setTargetAtTime(0, audio.currentTime, 0.02);
}

// A = self-destruct: blow the ship up immediately
function abort() {
  if (state === "ascent") { crashAscent("ABORTED — CRAFT DESTROYED"); }
  else if (state === "play") {
    state = "crashed";
    explosionSound(); explode();
    msg = "ABORTED — CRAFT DESTROYED";
    if (audioReady && thrustGain) thrustGain.gain.setTargetAtTime(0, audio.currentTime, 0.02);
  }
}

// hard mode: a tiny fast meteor crosses the docking region (top), full collision with the lander
function updateAsteroid(dt) {
  const nowMs = performance.now();
  if (nextAsteroid === 0) nextAsteroid = nowMs + rand(3500, 8000);
  if (!asteroid && nowMs > nextAsteroid) {
    const dir = Math.random() < 0.5 ? 1 : -1;
    asteroid = { x: wrapW(ship.x - dir * 760), y: soyuz.y + rand(40, 360), vx: dir * rand(190, 270), travel: 0 };
  }
  if (asteroid) {
    asteroid.x = wrapW(asteroid.x + asteroid.vx * dt);
    asteroid.travel += Math.abs(asteroid.vx) * dt;
    let adx = ship.x - asteroid.x; if (adx > WORLD / 2) adx -= WORLD; if (adx < -WORLD / 2) adx += WORLD;
    if (Math.hypot(adx, ship.y - asteroid.y) < 12) crashAscent("HIT BY METEOR");
    if (asteroid.travel > 1520) { asteroid = null; nextAsteroid = nowMs + rand(5000, 12000); }
  }
}
function drawAsteroid() {
  const a = asteroid, dir = a.vx > 0 ? 1 : -1;
  eachScreenX(a.x, (sx) => {
    ctx.save();
    glowOn(8, "#ffd0a0");
    ctx.strokeStyle = "rgba(255,185,125,0.85)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(sx, a.y); ctx.lineTo(sx - dir * 36, a.y); ctx.stroke();
    ctx.fillStyle = "#ecd6b4";
    ctx.beginPath(); ctx.arc(sx, a.y, 3.6, 0, Math.PI * 2); ctx.fill();
    glowOff();
    ctx.restore();
  });
}

function checkDocking() {
  // lander docking probe (its nose) in world coords
  const nx = ship.x + Math.sin(ship.angle) * 20;
  const ny = ship.y - Math.cos(ship.angle) * 20;
  const px = soyuz.x, py = soyuz.y + SOYUZ_PORT_DY;   // Soyuz port (on top)
  let dx = nx - px; if (dx > WORLD / 2) dx -= WORLD; if (dx < -WORLD / 2) dx += WORLD;
  const dist = Math.hypot(dx, ny - py);
  if (dist > DOCK_DIST) return;
  const relV = Math.hypot(ship.vx - soyuz.vx, ship.vy - soyuz.vy) / SCALE;
  const upright = Math.abs(normAngle(ship.angle)) < SAFE_ANGLE;
  if (relV <= DOCK_SPEED && upright) {
    startMoonClimb();   // dock confirmed -> now fly the Soyuz off the Moon up to Earth, then the cutscene
  } else {
    crashAscent(relV > DOCK_SPEED ? "DOCKING TOO FAST — DESTROYED" : "BAD ANGLE — DESTROYED", true);
  }
}

function checkLanding(gy) {
  const vDisp = Math.abs(ship.vy) / SCALE;
  const hDisp = Math.abs(ship.vx) / SCALE;
  const pad = padAt(ship.x);
  const upright = Math.abs(normAngle(ship.angle)) < SAFE_ANGLE;
  const onPad = pad && padAt(ship.x - 9) === pad && padAt(ship.x + 9) === pad;

  if (audioReady && thrustGain) thrustGain.gain.setTargetAtTime(0, audio.currentTime, 0.02);

  if (!awaitingUndock && onPad && vDisp <= SAFE_V && hDisp <= SAFE_H && upright) {
    state = "landed";
    const gained = Math.round(50 * pad.mult + Math.max(0, SAFE_V - vDisp) * 8);
    score += gained;
    showFlag = true; landedPad = pad;          // plant a flag on any landing
    if (pad.base === "soviet") { msg = "LANDED AT THE SOVIET MOON BASE  +" + gained; startCelebration(); const sb = moonBases.find(z => z.side === "soviet"); if (sb) { sb.peopleMode = "celebrate"; sb.peopleT = performance.now(); } }   // moon-base fanfare + cheering cosmonauts
    else if (pad.base === "american") { msg = "WORLD WAR III HAS BEGUN"; startWW3(); }
    else { msg = "PERFECT LANDING  +" + gained + "  (x" + pad.mult + " ZONE)"; if (!anthemActive) landingChime(); }   // x5 is now a normal landing
  } else {
    state = "crashed";
    const sp = Math.hypot(ship.vx, ship.vy) / SCALE;   // impact speed → more, faster debris
    explosionSound(); explode(clamp(sp / 60, 1, 3));
    if (awaitingUndock) { explodeSoyuz(); soyuz = null; msg = "CAN'T LAND DOCKED — STACK DESTROYED"; }   // the whole stack goes up
    else if (onPad && upright) msg = "TOO FAST — CRAFT DESTROYED";
    else if (onPad) msg = "BAD ANGLE — CRAFT DESTROYED";
    else msg = "YOU CRASHED INTO THE SURFACE";
  }
}

function normAngle(a) { while (a > Math.PI) a -= Math.PI * 2; while (a < -Math.PI) a += Math.PI * 2; return a; }

function spawnExhaust() {
  const tailX = ship.x - Math.sin(ship.angle) * 13;
  const tailY = ship.y + Math.cos(ship.angle) * 13;
  particles.push({
    x: tailX, y: tailY,
    vx: ship.vx * 0.3 + Math.sin(ship.angle) * rand(20, 60) + rand(-20, 20),
    vy: ship.vy * 0.3 + Math.cos(ship.angle) * rand(20, 60) + rand(-20, 20),
    life: rand(0.2, 0.5), kind: "ex"
  });
}
// power scales debris count + velocity (a fast, > 100-speed crash throws far more, faster)
function explode(power) {
  power = power || 1;
  const sparks = Math.round(90 * power), shards = Math.round(22 * power);
  // bright sparks blasting outward
  for (let i = 0; i < sparks; i++) {
    const a = rand(0, Math.PI * 2), s = rand(60, 380) * power;
    particles.push({ x: ship.x, y: ship.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60, life: rand(0.6, 1.8), kind: "boom" });
  }
  // tumbling wreckage shards (pieces of the lander)
  for (let i = 0; i < shards; i++) {
    const a = rand(0, Math.PI * 2), s = rand(40, 240) * power;
    particles.push({
      x: ship.x, y: ship.y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 70,
      rot: rand(0, Math.PI * 2), vrot: rand(-12, 12),
      len: rand(5, 14) * Math.min(1.5, power), life: rand(1.0, 2.4), kind: "shard"
    });
  }
}

// a high-speed smash into the Soyuz blows the station apart too, debris everywhere
function explodeSoyuz() {
  if (!soyuz) return;
  const sx = soyuz.x, sy = soyuz.y;
  rocketExplosionSound();
  const fc = ["#ff2a10", "#ff6a20", "#ffa83a", "#ffe06a", "#fff3b0"];
  for (let i = 0; i < 150; i++) { const a = rand(0, Math.PI * 2), s = rand(80, 560); particles.push({ x: sx, y: sy, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.8, 2.6), kind: "boom", col: fc[(Math.random() * fc.length) | 0] }); }
  for (let i = 0; i < 30; i++) { const a = rand(0, Math.PI * 2), s = rand(50, 320); particles.push({ x: sx, y: sy, vx: Math.cos(a) * s, vy: Math.sin(a) * s, rot: rand(0, Math.PI * 2), vrot: rand(-12, 12), len: rand(6, 18), life: rand(1.2, 2.8), kind: "shard" }); }
  for (let i = 0; i < 12; i++) { const a = rand(0, Math.PI * 2), s = rand(30, 180); particles.push({ x: sx, y: sy, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(1.6, 3.2), kind: "smoke", col: "#39332d" }); }
  gameFireballs.push({ x: sx, y: sy, t: performance.now() });
  soyuz = null;   // the station is destroyed
}

// a struck Moon-base structure blows apart; the base's crew get blown into space
function explodeMoonStruct(s, b) {
  s.dead = true;
  const fc = ["#ff2a10", "#ff6a20", "#ffa83a", "#ffe06a", "#fff3b0", "#cdd2d8"];
  for (let i = 0; i < 70; i++) { const a = rand(0, 6.28), sp = rand(50, 340); particles.push({ x: s.x, y: s.top + 8, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 50, life: rand(0.7, 2.2), kind: "boom", col: fc[(Math.random() * fc.length) | 0] }); }
  for (let i = 0; i < 14; i++) { const a = rand(0, 6.28), sp = rand(40, 200); particles.push({ x: s.x, y: s.top + 8, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 70, rot: rand(0, 6.28), vrot: rand(-12, 12), len: rand(5, 15), life: rand(1, 2.6), kind: "shard" }); }
  gameFireballs.push({ x: s.x, y: s.top + 8, t: performance.now() });
  if (b.peopleMode !== "flung") { b.peopleMode = "flung"; b.peopleT = performance.now(); }   // crew flung into space
  explosionSound();
}
// did the lander clip a base structure? if so, blow it up + fling the crew, and report the hit
function checkBaseCollision() {
  for (const b of moonBases) {
    let dcx = ship.x - b.cx; if (dcx > WORLD / 2) dcx -= WORLD; if (dcx < -WORLD / 2) dcx += WORLD;
    if (Math.abs(dcx) > 400) continue;
    for (const s of b.structs) {
      if (s.dead) continue;
      let dx = ship.x - s.x; if (dx > WORLD / 2) dx -= WORLD; if (dx < -WORLD / 2) dx += WORLD;
      if (Math.abs(dx) < s.hw + 7 && ship.y >= s.top - 6 && ship.y <= b.padY + 22) { explodeMoonStruct(s, b); if (b.side === "american" && !ww3Start) startWW3(); return true; }
    }
  }
  return false;
}

// --- Render ---
// run cb with each on-screen copy of a world-x position (handles the wrap seam)
function eachScreenX(worldX, cb) {
  const baseX = worldX - camX;
  for (let k = -1; k <= 2; k++) { const s = baseX + k * WORLD; if (s > -420 && s < W + 420) cb(s); }
}

// screen-y of the terrain silhouette directly under a given screen-x (under current zoom)
function groundScreenY(screenX) {
  const worldX = ship.x + (screenX - W / 2) / zoom;
  return (groundAt(worldX) - camFocusY) * zoom + viewAnchorY;
}

function render() {
  camX = ship.x - W / 2;

  // ease zoom toward the altitude-derived target
  const alt = Math.max(0, groundAt(ship.x) - ship.y);
  const t = clamp((alt - ZOOM_NEAR) / (ZOOM_FAR - ZOOM_NEAR), 0, 1);
  const zTarget = ZMAX + (ZMIN - ZMAX) * t;
  zoom += (zTarget - zoom) * 0.08;

  // camera eases vertically to follow the lander up and down the screen
  camFocusY += (ship.y - camFocusY) * 0.1;

  // during the x5 celebration, pan the lander toward the bottom so the sky is clear
  const anchorTarget = celebrating ? H * 0.84 : H * 0.36;
  viewAnchorY += (anchorTarget - viewAnchorY) * 0.06;

  // continents redden gradually over the celebration build (~8s)
  earthRed = celebrating ? clamp((performance.now() - celebrateStart) / 8000, 0, 1) : 0;

  ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);

  // Earth launch phase
  if (launching) { drawLaunch(); return; }

  // intro cinematic: stars + a lander flying toward the growing Moon
  if (intro) { drawStars(); drawIntro(); return; }

  // title screen shows the small Moon (top-right); gameplay shows the Earth as before
  if (onTitle) { drawMoonAt(TITLE_MOON.x, TITLE_MOON.y, TITLE_MOON.r); drawStars(); drawTitle(); return; }

  // fly the Soyuz off the Moon up to Earth (after docking, before the cutscene)
  if (state === "soyuzclimb") { drawMoonClimb(); return; }
  // return-to-Earth cutscene after docking
  if (state === "docked") { drawStars(); drawReturn(); return; }

  // background (unscaled — distant)
  drawEarth();
  drawWW3();
  drawStars();
  if (gameSputnik && !gameSputnik.hidden && !gameSputnik.dead) drawSputnik(gameSputnik.x, gameSputnik.y, 2.8, 850);   // smaller, slow red neon blink

  // world (scaled around the lander)
  ctx.save();
  ctx.translate(W / 2, viewAnchorY);
  ctx.scale(zoom, zoom);
  ctx.translate(-W / 2, -camFocusY);
  drawTerrain();
  drawParticles();
  if (gear) drawGear(gear);
  if (state === "play" && awaitingUndock && soyuz) {
    drawDockedStack();                                  // locked lander+Soyuz, co-rotating, pre-separation
  } else {
    if (soyuz && (state === "play" || state === "landed" || state === "ascent" || state === "crashed")) drawSoyuz(soyuz.x, soyuz.y);
    if (asteroid && (state === "ascent" || state === "crashed")) drawAsteroid();
    if (state === "ascent") drawShip(true);              // ascent stage, no legs
    else if (state === "play" || state === "landed") drawShip();
  }
  if (showFlag) drawFlag();
  // at the Soviet base, the lander's cosmonaut climbs out and celebrates (climbs back in when you leave)
  if (state === "landed" && landedPad && landedPad.base === "soviet") {
    const t = performance.now() / 1000, gpy = ship.y + 14;
    ctx.save(); ctx.translate(ship.x, gpy); ctx.scale(1.5, 1.5); ctx.translate(-ship.x, -gpy);
    drawAstroCelebrate(ship.x + 20, gpy, true, t);
    ctx.restore();
  }
  // big explosion fireballs (Soyuz crash)
  if (gameFireballs.length) {
    const nowMs = performance.now();
    for (const fb of gameFireballs) {
      const el = (nowMs - fb.t) / 1000; if (el > 0.9) continue;
      const rad = 24 + el * 320, al = clamp(1 - el / 0.9, 0, 1);
      eachScreenX(fb.x, (sxp) => {
        const rg = ctx.createRadialGradient(sxp, fb.y, 0, sxp, fb.y, rad);
        rg.addColorStop(0, "rgba(255,244,190," + (0.9 * al).toFixed(2) + ")");
        rg.addColorStop(0.45, "rgba(255,120,30," + (0.7 * al).toFixed(2) + ")");
        rg.addColorStop(1, "rgba(120,30,10,0)");
        ctx.fillStyle = rg; ctx.beginPath(); ctx.arc(sxp, fb.y, rad, 0, Math.PI * 2); ctx.fill();
      });
    }
    gameFireballs = gameFireballs.filter(fb => (performance.now() - fb.t) / 1000 < 0.9);
  }
  ctx.restore();

  // UI on top (unscaled)
  drawHUD();
  if (state === "play" && awaitingUndock && Math.floor(performance.now() / 500) % 2 === 0) {
    ctx.save();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    glowOn(8, "#bcd4ff"); ctx.fillStyle = "#dfeaff"; ctx.font = "bold 17px 'Courier New', monospace";
    ctx.fillText(tr("ЖМИ X — ОТСТЫКОВКА"), W / 2, H * 0.66);
    glowOff(); ctx.restore();
  }
  if (soyuz && state === "ascent") drawSoyuzMarker();   // only while climbing back to re-dock
  if ((state === "play" || state === "ascent") && fuel > 0 && fuel <= 100) drawLowFuelWarning();
  if (celebrating) drawCelebration();
  else if (state === "landed" || state === "crashed") drawBanner();
}

// Earth (gameplay background) — line-outline globe; continents redden in the x5 scene.

  const { x: ex, y: ey, r } = EARTH;

    ctx.drawImage(earthRedImg, ex - d / 2, ey - d / 2, d, d);

}

function drawStars() {
  const t = performance.now() / 1000;
  glowOn(6);
  ctx.fillStyle = FG;
  for (const s of stars) {
    // never draw a star below the terrain silhouette (no terrain on title/intro)
    if (!onTitle && !intro && s.y >= groundScreenY(s.x) - 3) continue;
    const b = 0.4 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.twinkle + s.phase));
    ctx.globalAlpha = b;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
  ctx.globalAlpha = 1; glowOff();
}

function drawTerrain() {
  // fill the ground solid black first so nothing (Earth, stars) shows through below the ridge
  glowOff();
  ctx.fillStyle = "#000";
  for (let k = -1; k <= 2; k++) {
    const off = -camX + k * WORLD;
    if (off > W + 80 || off + WORLD < -80) continue;
    ctx.beginPath();
    ctx.moveTo(terrain[0].x + off, terrain[0].y);
    for (let i = 1; i < terrain.length; i++) ctx.lineTo(terrain[i].x + off, terrain[i].y);
    ctx.lineTo(terrain[terrain.length - 1].x + off, 8000);
    ctx.lineTo(terrain[0].x + off, 8000);
    ctx.closePath();
    ctx.fill();
  }
  // then the glowing ridge line on top
  glowOn(9);
  ctx.strokeStyle = FG; ctx.lineWidth = 2;
  for (let k = -1; k <= 2; k++) {
    const off = -camX + k * WORLD;
    if (off > W + 80 || off + WORLD < -80) continue;
    ctx.beginPath();
    ctx.moveTo(terrain[0].x + off, terrain[0].y);
    for (let i = 1; i < terrain.length; i++) ctx.lineTo(terrain[i].x + off, terrain[i].y);
    ctx.stroke();
  }
  // pads (thicker) + multiplier labels
  for (let k = -1; k <= 2; k++) {
    const off = -camX + k * WORLD;
    if (off > W + 80 || off + WORLD < -80) continue;
    for (const p of pads) {
      const x1 = p.x1 + off, x2 = p.x2 + off;
      if (x2 < -40 || x1 > W + 40) continue;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(x1, p.y); ctx.lineTo(x2, p.y); ctx.stroke();
      glowOff();
      if (!p.base) {   // base pads aren't score zones — no x-multiplier label
        ctx.fillStyle = FG; ctx.font = "13px 'Courier New', monospace";
        ctx.textAlign = "center"; ctx.textBaseline = "bottom";
        ctx.fillText("x" + p.mult, (x1 + x2) / 2, p.y + 22);
      }
      glowOn(9);
    }
  }
  glowOff();
  drawMoonBases();
}

// ---- Far-flung Moon bases: line art in a slightly bluer tint than the white surface ----
function drawAstro(x, gy, soviet) {
  ctx.save(); ctx.lineCap = "round"; ctx.lineWidth = 1.8;
  ctx.strokeStyle = soviet ? "#ff9a3a" : "#dfe7f2"; ctx.fillStyle = "#eef3ff";   /* helmet always white */ glowOn(4, soviet ? "#ffb060" : "#bcd4ff");
  const head = gy - 13;
  ctx.beginPath(); ctx.arc(x, head, 3.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x, head + 3); ctx.lineTo(x, gy - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, head + 5); ctx.lineTo(x - 4, head + 9); ctx.moveTo(x, head + 5); ctx.lineTo(x + 4, head + 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, gy - 4); ctx.lineTo(x - 3, gy); ctx.moveTo(x, gy - 4); ctx.lineTo(x + 3, gy); ctx.stroke();
  ctx.strokeStyle = soviet ? "#ff6a6a" : "#6aa8ff"; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(x, head, 2.0, -0.7, 0.9); ctx.stroke();
  glowOff(); ctx.restore();
}

function drawAstroRun(x, gy, soviet, t) {

  glowOff();
  glowOn(6, "#9fc4e6"); ctx.strokeStyle = C; ctx.lineWidth = 1.6;
  const lx = sx - 108, mx = sx - 60, dx = sx - 165, px2 = sx - 140, ax = sx + 28;
  if (!dead("hab")) {

function drawStar(cx, cy, rO, rI, color) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const rr = i % 2 === 0 ? rO : rI;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.closePath();
  glowOn(5, "#f44");
  ctx.fillStyle = color; ctx.fill();
  glowOn(8, "#bcd4ff");
}

// trace a 5-point star path (no fill/stroke)
function starPath(cx, cy, rO, rI) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const rr = i % 2 === 0 ? rO : rI;
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.closePath();
}

// small red Soviet flag planted on the flat pad beside the lander
function drawFlag() {
  if (!landedPad) return;
  const p = landedPad;
  // plant toward whichever pad edge had more room (frozen to the landing spot once we launch)
  const refX = gear ? gear.x : ship.x;
  const fx = (p.x2 - refX >= refX - p.x1) ? p.x2 - 6 : p.x1 + 6;
  const baseY = p.y;                      // pad is flat, so this is level ground
  const wav = Math.sin(performance.now() / 180);
  eachScreenX(fx, (sxp) => {
    glowOff();
    // pole
    ctx.strokeStyle = "#cfcfcf"; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(sxp, baseY); ctx.lineTo(sxp, baseY - 36); ctx.stroke();
    // red banner (gently waving)
    ctx.fillStyle = "#d11";
    ctx.beginPath();
    ctx.moveTo(sxp, baseY - 36);
    ctx.lineTo(sxp + 22, baseY - 34 + wav * 2);
    ctx.lineTo(sxp + 22, baseY - 23 + wav * 2);
    ctx.lineTo(sxp, baseY - 25);
    ctx.closePath(); ctx.fill();
    // gold hammer & sickle, tucked inside the upper-left of the banner near the pole
    if (hsReady) ctx.drawImage(hsImg, sxp + 2.5, baseY - 34 + wav, 8, 8);

}

// the big growing red star + hammer & sickle + Russian congratulation
function drawCelebration() {
  const elapsed = (performance.now() - celebrateStart) / 1000;
  const BUILD = 8;
  const g = clamp(elapsed / BUILD, 0, 1);
  const ease = g * g * (3 - 2 * g);       // smoothstep

  const targetX = W / 2, targetY = H * 0.30;
  const cx = redStarOrigin.x + (targetX - redStarOrigin.x) * ease;
  const cy = redStarOrigin.y + (targetY - redStarOrigin.y) * ease;
  const rO = 2 + ease * 92;               // grows to ~Russia-sized
  const rI = rO * 0.42;

  ctx.save();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";

  // red star
  starPath(cx, cy, rO, rI);
  glowOn(20, "#ff3333");
  ctx.fillStyle = "#d51616"; ctx.fill();
  glowOff();

  // golden hammer & sickle image, fading in as the star nears full size
  const emblemA = clamp((elapsed - BUILD * 0.65) / 2, 0, 1);
  if (emblemA > 0 && hsReady) {
    ctx.globalAlpha = emblemA;
    const size = rO * 1.25;
    ctx.drawImage(hsImg, cx - size / 2, cy - size / 2, size, size);
    ctx.globalAlpha = 1;
  }

  // Russian congratulation under the star — red neon outline
  const textA = clamp((elapsed - BUILD * 0.85) / 1.5, 0, 1);
  if (textA > 0) {
    ctx.save();
    ctx.globalAlpha = textA;
    ctx.font = "bold 24px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.lineJoin = "round"; ctx.miterLimit = 2;
    const txt = tr("С ПРИБЫТИЕМ НА ЗВЕЗДУ!");
    const tx = W / 2, ty = cy + rO + 40;
    // outer red glow — several passes build the neon halo
    ctx.shadowColor = "#ff0033";
    ctx.strokeStyle = "#ff1a1a";
    for (let i = 0; i < 3; i++) { ctx.shadowBlur = 16 + i * 10; ctx.lineWidth = 3; ctx.strokeText(txt, tx, ty); }
    // hot bright inner tube
    ctx.shadowBlur = 6;
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = "#ffd6d6";
    ctx.strokeText(txt, tx, ty);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // skip / play-again prompt (music plays on)
  ctx.fillStyle = "#9aa";
  ctx.font = "14px 'Courier New', monospace";
  ctx.fillText("PRESS ENTER TO PLAY AGAIN", W / 2, H - 38);
  ctx.restore();
}

  ctx.save();
  glowOn(5); ctx.strokeStyle = FG; ctx.lineWidth = 1.6; ctx.beginPath(); ctx.arc(0, -6.5, 3, 0, Math.PI * 2); ctx.stroke();
  ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, -6.5, 1.8, 0, Math.PI * 2); ctx.stroke();
  glowOff(); ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.beginPath(); ctx.arc(-0.9, -7.4, 0.7, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
  // tiny, slow-blinking red beacon at the antenna tip (very small)

function drawShipAt(px, py, noLegs) {
  ctx.save();

    ctx.moveTo(3, 8); ctx.lineTo(5, 16); ctx.lineTo(8, 16);

  // descent engine nozzle
  ctx.beginPath();
  ctx.moveTo(-3, 8); ctx.lineTo(-2, 12); ctx.lineTo(2, 12); ctx.lineTo(3, 8);

  // small Soviet red star on the hull
  drawStar(0, -1, 5.4, 2.3, "#e22");

// the Soyuz: solar panels + service module + orbital module + descent capsule + docking port
const SOYUZ_S = 1.75;         // Soyuz draw/collision scale
const SOYUZ_PORT_DY = 33;     // docking port offset from soyuz centre (bottom)
function drawSoyuzAt(x, y) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(SOYUZ_S, SOYUZ_S);
  if (n1()) ctx.scale(1.1, 1.1);   // the LOK draws a touch bigger
  glowOn(7); ctx.strokeStyle = FG; ctx.lineWidth = 1.3;
  // orbital module (sphere) at the top + antenna (the LOK has no top antenna)
  ctx.beginPath(); ctx.arc(0, -13, 8, 0, Math.PI * 2); ctx.stroke();
  if (!n1()) { ctx.beginPath(); ctx.moveTo(0, -21); ctx.lineTo(0, -25); ctx.stroke(); }
  // service module
  ctx.beginPath(); ctx.rect(-8, -5, 16, 13); ctx.stroke();
  if (n1()) {
    // fuel-cell LOK: no big solar wings — short ribbed radiator fins flanking the service module
    ctx.beginPath(); ctx.rect(-13, -1, 5, 8); ctx.rect(8, -1, 5, 8); ctx.stroke();
    for (let j = 1; j <= 5; j += 1.6) { ctx.beginPath(); ctx.moveTo(-13, -1 + j); ctx.lineTo(-8, -1 + j); ctx.moveTo(8, -1 + j); ctx.lineTo(13, -1 + j); ctx.stroke(); }
  } else {
    // solar panels (wings)
    ctx.beginPath(); ctx.rect(-40, -3, 30, 8); ctx.rect(10, -3, 30, 8); ctx.stroke();
    for (let i = -34; i <= -16; i += 6) { ctx.beginPath(); ctx.moveTo(i, -3); ctx.lineTo(i, 5); ctx.stroke(); }
    for (let i = 16; i <= 34; i += 6) { ctx.beginPath(); ctx.moveTo(i, -3); ctx.lineTo(i, 5); ctx.stroke(); }
  }
  // descent capsule (bell)
  ctx.beginPath(); ctx.moveTo(-8, 8); ctx.lineTo(8, 8); ctx.lineTo(5, 16); ctx.lineTo(-5, 16); ctx.closePath(); ctx.stroke();
  // docking port / probe at the BOTTOM (where the lander attaches)
  ctx.beginPath(); ctx.moveTo(-3.5, 16); ctx.lineTo(3.5, 16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, 16); ctx.lineTo(0, 20); ctx.stroke();
  glowOff();
  drawStar(0, -13, 3, 1.3, "#e22");
  // navigation lights — red port wing / green starboard, alternating slow flash
  {
    const redOn = Math.floor(performance.now() / 600) % 2 === 0;
    const navX = n1() ? 13 : 40;   // LOK has no wings, so the nav lights sit on the radiator fins
    if (redOn) { glowOn(6, "#ff2a2a"); ctx.fillStyle = "#ff3b3b"; } else { glowOff(); ctx.fillStyle = "#3a1010"; }
    ctx.beginPath(); ctx.arc(-navX, 1, 1.4, 0, Math.PI * 2); ctx.fill();
    if (!redOn) { glowOn(6, "#2aff5a"); ctx.fillStyle = "#3bff6b"; } else { glowOff(); ctx.fillStyle = "#10341a"; }
    ctx.beginPath(); ctx.arc(navX, 1, 1.4, 0, Math.PI * 2); ctx.fill();
    glowOff();
  }
  ctx.restore();
}
// solid collision with the Soyuz body + panels (everything except the dock corridor)
function soyuzCollision() {
  const S = SOYUZ_S, r = 13;
  let dx = ship.x - soyuz.x; if (dx > WORLD / 2) dx -= WORLD; if (dx < -WORLD / 2) dx += WORLD;
  const ly = ship.y - soyuz.y;
  const hit = (x1, y1, x2, y2) => {
    const cx = clamp(dx, x1, x2), cy = clamp(ly, y1, y2);
    return (dx - cx) * (dx - cx) + (ly - cy) * (ly - cy) < r * r;
  };
  if (n1()) return hit(-9 * S, -22 * S, 9 * S, 16 * S);   // fuel-cell LOK: body only, no wings
  return hit(-9 * S, -22 * S, 9 * S, 16 * S) ||   // central body
         hit(-40 * S, -3 * S, -10 * S, 5 * S) ||   // left panel
         hit(10 * S, -3 * S, 40 * S, 5 * S);       // right panel
}
function drawSoyuz(x, y) { eachScreenX(x, (sx) => drawSoyuzAt(sx, y)); }
// when the Soyuz has scrolled off the top of the screen, point an up-arrow at it
function drawSoyuzMarker() {

  if (dx > WORLD / 2) dx -= WORLD; else if (dx < -WORLD / 2) dx += WORLD;
  const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 250);
  const sx = clamp(W / 2 + zoom * dx, 26, W - 26);
  ctx.save();
  glowOn(8, "#bcd4ff"); ctx.globalAlpha = pulse;
  ctx.strokeStyle = "#dfeaff"; ctx.fillStyle = "#dfeaff"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.textAlign = "center";
  if (syScreen <= 30) {
    // Soyuz off the top: arrow pinned to the top edge at its horizontal position
    ctx.translate(sx, 24);
    ctx.beginPath(); ctx.moveTo(0, 14); ctx.lineTo(0, -8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(-7, -4); ctx.lineTo(7, -4); ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1; glowOff();
    ctx.fillStyle = "#bcd4ff"; ctx.font = "11px 'Courier New', monospace"; ctx.fillText(tr("СОЮЗ"), 0, 31);
  } else {
    // Soyuz on-screen: a downward arrow + label hovering just above it
    const ay = clamp(syScreen - 30, 22, H - 30);

    ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(0, 8); ctx.stroke();

    ctx.globalAlpha = 1; glowOff();
    ctx.fillStyle = "#bcd4ff"; ctx.font = "11px 'Courier New', monospace"; ctx.fillText(tr("СОЮЗ"), 0, -16);

// line-outline Earth at (cx,cy,r) with the USSR (Asia outline) glowing neon red — return cutscene

  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  glowOff();
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.clip();
  // the Asia outline = the USSR, glowing neon red, brightening as Earth fills the view
  ctx.lineJoin = "round";
  for (const poly of EARTH_LAND.concat(EARTH_ISLANDS)) {
    ctx.beginPath();
    poly.forEach((p, i) => { const x = cx + p[0] * r, y = cy + p[1] * r; i ? ctx.lineTo(x, y) : ctx.moveTo(x, y); });
    ctx.closePath();
    if (glow > 0) { ctx.globalAlpha = glow * 0.85; ctx.fillStyle = "#e01818"; ctx.shadowColor = "#ff0033"; ctx.shadowBlur = 14; ctx.fill(); ctx.globalAlpha = 1; }
    ctx.shadowColor = "#ff0033"; ctx.shadowBlur = 8; ctx.strokeStyle = "#ff1a1a"; ctx.lineWidth = 1.6; ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
  ctx.restore();
}

// return-to-Earth cutscene after a successful dock
function spawnFirework(x, y) {
  const col = Math.random() < 0.5 ? "#ff3636" : "#ffcf3a";
  for (let i = 0; i < 30; i++) {
    const a = rand(0, Math.PI * 2), s = rand(40, 150);
    fireworks.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.6, 1.4), col });
  }
}

function drawReturn() {
  const now = performance.now();
  const p = clamp((now - returnStart) / RETURN_DUR, 0, 1);
  const ease = p * p;

  // Earth starts small & far, grows as the craft approaches — orthographic USSR globe
  // Earth grows but stays fully on-screen (never cropped top or bottom)
  const ecx = W * 0.5, ecy = H * 0.56, er = 14 + ease * 256;
  if (earthWhiteReady) {
    const d = er * 2;
    ctx.save();
    ctx.shadowColor = "#ffae00"; ctx.shadowBlur = 14;   // gold neon glow
    ctx.drawImage(earthWhiteImg, ecx - er, ecy - er, d, d);
    if (earthRedReady) {                                 // whole land slowly turns red + gold
      ctx.globalAlpha = clamp(ease * 1.2, 0, 1);
      ctx.drawImage(earthRedImg, ecx - er, ecy - er, d, d);
      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }
  // if World War III was started at the American base, the war rages on across this Earth too (no audio)
  drawWW3(ecx, ecy, er);

  // docked craft descends into the USSR, then keeps shrinking until it vanishes
  const rusx = ecx, rusy = ecy - er * 0.05;
  const landP = clamp(p / 0.55, 0, 1), le = landP * landP * (3 - 2 * landP);
  const cs = Math.max(0, 1.9 - p * 2.6);
  if (cs > 0.02) {
    const cx = W * 0.5 + (rusx - W * 0.5) * le, cy = H * 0.18 + (rusy - H * 0.18) * le;
    ctx.save();
    ctx.translate(cx, cy); ctx.scale(cs, cs);
    drawSoyuzAt(0, 0);
    drawDockedLander();   // collar ties them into one craft
    ctx.restore();
  }

  // neon-white flash + beep the instant it disappears
  if (!returnFlashed && cs <= 0.02 && p > 0.3) { returnFlashed = true; returnFlashTime = now; neonBeep(); }
  if (returnFlashed) {
    const fe = (now - returnFlashTime) / 1000;
    if (fe < 0.5) {
      const fa = 1 - fe / 0.5;
      const fg = ctx.createRadialGradient(rusx, rusy, 0, rusx, rusy, 220);
      fg.addColorStop(0, "rgba(238,246,255," + (0.95 * fa).toFixed(2) + ")");
      fg.addColorStop(0.5, "rgba(190,212,255," + (0.5 * fa).toFixed(2) + ")");
      fg.addColorStop(1, "rgba(190,212,255,0)");
      ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(rusx, rusy, 220, 0, Math.PI * 2); ctx.fill();
    }
  }

  // after the flash, the red star + ☭ emerges from a background star and grows MUCH bigger
  const sp = clamp((p - 0.74) / 0.24, 0, 1);
  if (sp > 0) {
    const se = sp * sp * (3 - 2 * sp);
    const ox = redStarOrigin.x, oy = redStarOrigin.y;
    const ssx = ox + (rusx - ox) * se, ssy = oy + (rusy - oy) * se, ssr = 3 + se * 94;
    starPath(ssx, ssy, ssr, ssr * 0.42);
    glowOn(24, "#c81818"); ctx.fillStyle = "#960c0c"; ctx.fill(); glowOff();   // darker red
    // bright cool-gold neon outline — set apart from the warm red/gold globe behind it
    ctx.save();
    ctx.shadowColor = "#ffe14d"; ctx.shadowBlur = 22; ctx.lineJoin = "round";
    ctx.strokeStyle = "#ffe96b"; ctx.lineWidth = Math.max(1.6, ssr * 0.07); ctx.stroke();
    ctx.shadowBlur = 9; ctx.strokeStyle = "#fffbe0"; ctx.lineWidth = Math.max(0.9, ssr * 0.035); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
    if (hsReady && se > 0.4) {
      const z = ssr * 1.25;
      ctx.globalAlpha = clamp((se - 0.4) / 0.4, 0, 1);
      ctx.drawImage(hsImg, ssx - z / 2, ssy - z / 2, z, z);
      ctx.globalAlpha = 1;
    }
  }

  // fireworks off to the sides
  const dt = Math.min(0.05, (now - (fwLast || now)) / 1000); fwLast = now;
  if (now > nextFirework) {
    spawnFirework(Math.random() < 0.5 ? W * rand(0.08, 0.22) : W * rand(0.78, 0.92), rand(H * 0.12, H * 0.42));
    nextFirework = now + rand(450, 1100);
  }
  for (const f of fireworks) { f.x += f.vx * dt; f.y += f.vy * dt; f.vy += 55 * dt; f.life -= dt; }
  fireworks = fireworks.filter(f => f.life > 0);
  glowOn(8);
  for (const f of fireworks) { ctx.globalAlpha = clamp(f.life, 0, 1); ctx.fillStyle = f.col; ctx.fillRect(f.x - 1.5, f.y - 1.5, 3, 3); }
  ctx.globalAlpha = 1; glowOff();

  // congratulation — appears only as the red star emerges, gently arced over the top of Earth
  if (sp > 0) {
    ctx.save();
    ctx.globalAlpha = sp;
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.lineJoin = "round";
    ctx.font = "bold 24px 'Courier New', monospace";
    const cxc = ecx;
    // arcs a string of text across the top, centred on 12 o'clock; `inner` = bright thin pass
    const arcText = (txt, R, lw, glow) => {
      const cyc = H * 0.05 + 540;                    // shared arc centre → gentle shared curve
      let total = 0; const ws = [];
      for (const ch of txt) { const w = ctx.measureText(ch).width; ws.push(w); total += w; }
      let ang = -Math.PI / 2 - (total / R) / 2;
      for (let i = 0; i < txt.length; i++) {
        ang += (ws[i] / 2) / R;
        const x = cxc + Math.cos(ang) * R, y = cyc + Math.sin(ang) * R;
        ctx.save();
        ctx.translate(x, y); ctx.rotate(ang + Math.PI / 2);
        ctx.shadowColor = "#ff0033"; ctx.strokeStyle = "#ff1a1a";
        for (let k = 0; k < 3; k++) { ctx.shadowBlur = glow + k * 9; ctx.lineWidth = lw; ctx.strokeText(txt[i], 0, 0); }
        ctx.shadowBlur = glow * 0.4; ctx.lineWidth = lw * 0.45; ctx.strokeStyle = "#ffd6d6"; ctx.strokeText(txt[i], 0, 0);
        ctx.shadowBlur = 0;
        ctx.restore();
        ang += (ws[i] / 2) / R;
      }
    };
    ctx.font = "bold 24px 'Courier New', monospace";
    arcText(tr("Поздравляем, товарищ космонавт!"), 540, 3, 14);
    ctx.globalAlpha = sp * 0.92;
    ctx.font = "bold 14px 'Courier New', monospace";
    arcText(tr("КОММУНИЗМ ТОРЖЕСТВУЕТ НАД КОСМОСОМ"), 506, 1.8, 9);   // sub-text, just below
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  if (p >= 1) {
    ctx.save();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#cfd6e6"; ctx.font = "14px 'Courier New', monospace";
    ctx.fillText("SCORE " + score, W / 2, H * 0.82);
    ctx.fillStyle = "#9fb0c8"; ctx.font = "13px 'Courier New', monospace";
    ctx.fillText(tr("КАК ВЕРНУТЬСЯ ДОМОЙ?"), W / 2, H * 0.88);
    ctx.font = "bold 17px 'Courier New', monospace";
    glowOn(8, "#ffd24a"); ctx.fillStyle = "#ffe07a";
    ctx.fillText("◄ " + tr("ГЕРОЕМ"), W * 0.30, H * 0.94);
    ctx.fillText(tr("МИЛЛИОНЕРОМ") + " ►", W * 0.70, H * 0.94);
    glowOff();
    ctx.restore();
  }
}

function drawParticles() {
  glowOn(6);
  ctx.strokeStyle = FG; ctx.fillStyle = FG; ctx.lineWidth = 2;
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 1.4));
    if (p.kind === "shard") {
      const dx = Math.cos(p.rot) * p.len / 2, dy = Math.sin(p.rot) * p.len / 2;
      eachScreenX(p.x, (sxp) => {
        ctx.beginPath();
        ctx.moveTo(sxp - dx, p.y - dy);
        ctx.lineTo(sxp + dx, p.y + dy);
        ctx.stroke();
      });
    } else if (p.kind === "smoke") {
      ctx.globalAlpha *= 0.5; ctx.fillStyle = p.col || "#39332d";
      eachScreenX(p.x, (sxp) => ctx.fillRect(sxp - 2.5, p.y - 2.5, 5, 5));
      ctx.fillStyle = FG;
    } else {
      const s = p.kind === "boom" ? 2.6 : 1.6;
      if (p.col) ctx.fillStyle = p.col;
      eachScreenX(p.x, (sxp) => ctx.fillRect(sxp - s / 2, p.y - s / 2, s, s));
      if (p.col) ctx.fillStyle = FG;
    }
  }
  ctx.globalAlpha = 1; glowOff();
}

function drawHUD() {
  ctx.save();
  glowOn(4);
  ctx.fillStyle = FG;
  ctx.font = "16px 'Courier New', monospace";
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  const shownFuel = awaitingUndock ? soyuzFuel : fuel;   // docked stack shows the Soyuz tank
  ctx.fillText(tr("ОЧКИ ") + pad6(score) + tr("    ВРЕМЯ ") + Math.ceil(timeLeft) + tr("    ТОПЛИВО ") + Math.round(shownFuel), 16, 12);
  const vD = ship.vy / SCALE, hD = ship.vx / SCALE;
  const alt = Math.max(0, Math.round(groundAt(ship.x) - ship.y));
  ctx.fillText(
    tr("ВЫСОТА ") + pad4(alt) +
    tr("   ГОР. СКОРОСТЬ ") + (hD >= 0 ? "▶" : "◀") + " " + Math.abs(hD).toFixed(1) +
    tr("   ВЕРТ. СКОРОСТЬ ") + (vD >= 0 ? "▼" : "▲") + " " + Math.abs(vD).toFixed(1),
    16, 34);
  glowOff();
  ctx.restore();
}
function pad6(n) { return ("000000" + Math.round(n)).slice(-6); }
function pad4(n) { return ("0000" + Math.round(n)).slice(-4); }

// small Sputnik-1: a sphere with four swept-back antennas + a motion trail
function drawSputnik(cx, cy, r, blinkMs) {

  glowOn(7, "#cfe0ff");
  ctx.fillStyle = "#dce8ff";
  for (let i = 1; i <= 6; i++) {
    ctx.globalAlpha = 0.55 * (1 - i / 7);

    ctx.arc(cx - i * r * 1.5, cy + i * r * 0.34, r * (0.45 - i * 0.045), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  glowOff();
  glowOn(7);
  ctx.strokeStyle = FG; ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  ctx.globalAlpha = 0.5;
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.58, 0, Math.PI * 2); ctx.stroke();
  ctx.globalAlpha = 1;
  for (const a of [Math.PI * 0.62, Math.PI * 0.82, Math.PI * 1.02, Math.PI * 1.22]) {
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    ctx.lineTo(cx + Math.cos(a) * r * 3.4, cy + Math.sin(a) * r * 3.4);
    ctx.stroke();
  }
  glowOff();

// Soviet R-7/Soyuz-style rocket: central core + strap-on boosters, red star, СССР.
// `sep` > 0 flies the boosters outward (staging); `flame` draws engine exhaust.
// the R-7 / Vostok silhouette: a tall slim core with four pointed conical strap-on
// boosters clustered and flared around its base, capsule + fairing on top
// a big, detailed engine flame: long faint plume/trail, orange body, yellow inner, white-hot core,
// plus bright mach-diamond nodes down the centreline. (x, baseY) = nozzle exit; flame burns downward.
// re-entry parachute, drawn above the lander (in the lander's local frame, origin at the lander body)
function drawParachute() {
  const cx = Math.sin(performance.now() / 700) * 3, cy = -52, R = 28;   // gentle sway
  ctx.save();
  glowOn(6); ctx.strokeStyle = FG; ctx.lineWidth = 2; ctx.lineCap = "round";
  ctx.beginPath(); ctx.arc(cx, cy, R, Math.PI, 0); ctx.stroke();                 // canopy dome
  ctx.beginPath(); ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy); ctx.stroke(); // canopy base
  ctx.lineWidth = 1;
  for (const s of [-0.6, 0, 0.6]) { ctx.beginPath(); ctx.moveTo(cx, cy - R); ctx.lineTo(cx + Math.sin(s) * R, cy); ctx.stroke(); }   // panel seams
  for (const lx of [-R, -R * 0.5, 0, R * 0.5, R]) { ctx.beginPath(); ctx.moveTo(cx + lx, cy); ctx.lineTo(0, -13); ctx.stroke(); }    // suspension lines to the lander
  glowOff(); ctx.restore();
}
function drawEngineFlame(x, baseY, w, len) {
  const fl = len * (0.86 + Math.random() * 0.28);   // flicker length each frame
  const wob = (Math.random() - 0.5) * w * 0.5;       // slight tip wander
  ctx.save();
  ctx.lineJoin = "round";
  const tear = (ww, ll) => {
    ctx.beginPath();
    ctx.moveTo(x - ww, baseY);
    ctx.quadraticCurveTo(x - ww * 0.45, baseY + ll * 0.6, x + wob, baseY + ll);
    ctx.quadraticCurveTo(x + ww * 0.45, baseY + ll * 0.6, x + ww, baseY);
    ctx.closePath();
  };
  glowOn(22, "#ff5a12"); ctx.fillStyle = "rgba(255,105,28,0.28)"; tear(w * 1.55, fl * 1.75); ctx.fill();   // long trail/plume
  glowOn(16, "#ff8a2a"); ctx.fillStyle = "rgba(255,150,50,0.92)"; tear(w, fl); ctx.fill();                 // main orange flame
  glowOn(9, "#ffd24a"); ctx.fillStyle = "rgba(255,216,82,0.95)"; tear(w * 0.6, fl * 0.82); ctx.fill();     // inner yellow body
  ctx.fillStyle = "rgba(255,250,236,0.95)"; tear(w * 0.32, fl * 0.55); ctx.fill();                          // white-hot core
  glowOff();
  // mach diamonds — bright shock nodes down the centreline
  ctx.fillStyle = "rgba(255,246,224,0.9)";
  for (let i = 1; i <= 3; i++) {
    const dy = baseY + fl * 0.16 * i, dw = w * 0.24 * (1 - i * 0.16);
    ctx.beginPath(); ctx.moveTo(x - dw, dy); ctx.lineTo(x, dy - dw * 0.8); ctx.lineTo(x + dw, dy); ctx.lineTo(x, dy + dw * 0.8); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}
function drawRocket(flame, sep, noNose) {
  sep = sep || 0;
  ctx.save();
  ctx.lineJoin = "round";
  // a tapered strap-on booster: narrow pointed nose at top, flaring wide at the engine skirt
  const booster = (sgn) => {
    ctx.save();
    ctx.translate(sgn * sep, sep * 0.35);
    ctx.rotate(sgn * sep * 0.014);
    if (sep > 0) ctx.globalAlpha = clamp(1 - sep / 26, 0, 1);
    glowOn(6); ctx.strokeStyle = FG; ctx.lineWidth = 1.5;
    // cone body: inner edge hugs the core, outer edge flares out to a wide base
    ctx.beginPath();
    ctx.moveTo(sgn * 5, 18);            // base, inner
    ctx.lineTo(sgn * 5, -8);            // up the inner seam
    ctx.lineTo(sgn * 10, -30);          // pointed booster nose
    ctx.lineTo(sgn * 14.5, 14);         // flare down the outer edge (a touch tighter)
    ctx.lineTo(sgn * 15.5, 18);         // engine skirt
    ctx.closePath(); ctx.stroke();
    // a body band
    ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(sgn * 6, 2); ctx.lineTo(sgn * 14, 2); ctx.stroke();
    if (flame) drawEngineFlame(sgn * 10.5, 18, 4.2, 26);
    glowOff();
    ctx.restore();
  };
  booster(-1); booster(1);
  // central core stage: slim cylinder, taller than the boosters
  glowOn(7); ctx.strokeStyle = FG; ctx.lineWidth = 1.7;
  ctx.beginPath();
  ctx.moveTo(-6, 18); ctx.lineTo(-6, -42); ctx.lineTo(6, -42); ctx.lineTo(6, 18); ctx.closePath(); ctx.stroke();
  // interstage taper up to the payload section + capsule fairing + pointed nose (omitted once jettisoned)
  if (!noNose) {
    ctx.beginPath();
    ctx.moveTo(-6, -42); ctx.lineTo(-4.5, -50); ctx.lineTo(-4.5, -58); ctx.lineTo(0, -70); ctx.lineTo(4.5, -58); ctx.lineTo(4.5, -50); ctx.lineTo(6, -42);
    ctx.stroke();
    ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(-4.5, -58); ctx.lineTo(4.5, -58); ctx.stroke();
  }
  // separation/stage rings on the core
  ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(-6, -42); ctx.lineTo(6, -42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6, 2); ctx.lineTo(6, 2); ctx.stroke();
  glowOff();
  // red star high on the core + small red СССР stacked below it, within the core walls
  drawStar(0, -34, 4, 1.7, "#e22");
  glowOn(3, "#ff3a3a"); ctx.fillStyle = "#ff3b3b";
  ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "bold 5px 'Courier New', monospace";
  const ll = cccp();
  for (let i = 0; i < ll.length; i++) ctx.fillText(ll[i], 0, -24 + i * 6);
  glowOff();
  // core flame (sustainer, burns much longer/larger than the strap-ons) with a long trailing plume
  if (flame) drawEngineFlame(0, 18, 5.6, 46);
  ctx.restore();
}
// the jettisoned nose fairing as a standalone piece (base centred at the local origin, tip up)
function drawNoseCone() {
  ctx.save();
  ctx.lineJoin = "round";
  glowOn(7); ctx.strokeStyle = FG; ctx.lineWidth = 1.7;
  ctx.beginPath();
  ctx.moveTo(-6, 0); ctx.lineTo(-4.5, -8); ctx.lineTo(-4.5, -16); ctx.lineTo(0, -28); ctx.lineTo(4.5, -16); ctx.lineTo(4.5, -8); ctx.lineTo(6, 0);
  ctx.closePath(); ctx.stroke();
  ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(-4.5, -16); ctx.lineTo(4.5, -16); ctx.stroke();
  glowOff();
  ctx.restore();
}

// the Soviet N1 — a big tapered cone with red open-lattice interstages. Drawn as transparent line-art
// (no fill) like the Vostok, but with white/gray coloured outlines, red lattice, mid bands, star + СССР.
// opts:
//   gone  — how many bottom stages have been jettisoned (0 = full stack … N = bare payload)
//   nose  — fairing + escape tower present (default true)
//   flame — the current lowest remaining stage is firing
//   only  — draw ONLY this one stage segment (used for a jettisoned stage tumbling away)
function drawN1(opts) {
  opts = opts || {};
  const gone = opts.gone || 0, nose = opts.nose !== false, flame = opts.flame;
  const N = N1_STAGES.length;
  ctx.save();
  ctx.lineJoin = "round"; ctx.lineCap = "round";
  const WHITE = "#e9eef3", GRAY = "#c2cad4", RED = "#d23b2c";
  const seg = (s) => {   // transparent: coloured outline + several detail bands + vertical seams
    ctx.strokeStyle = s.white ? WHITE : GRAY;
    glowOn(s.white ? 3 : 6, s.white ? "#cfe6ff" : "#cdd6e2"); ctx.lineWidth = s.white ? 1.6 : 2.1;
    ctx.beginPath(); ctx.moveTo(-s.wb, s.yb); ctx.lineTo(-s.wt, s.yt); ctx.moveTo(s.wb, s.yb); ctx.lineTo(s.wt, s.yt); ctx.stroke();   // slanted sides
    ctx.lineWidth = 1.3; ctx.beginPath(); ctx.moveTo(-s.wb, s.yb); ctx.lineTo(s.wb, s.yb); ctx.stroke();                              // bottom ring (stage joint)
    ctx.lineWidth = 0.8;   // horizontal detail bands
    for (const f of [0.18, 0.4, 0.6, 0.82]) { const y = s.yb + (s.yt - s.yb) * f, w = s.wb + (s.wt - s.wb) * f; ctx.beginPath(); ctx.moveTo(-w, y); ctx.lineTo(w, y); ctx.stroke(); }
    ctx.lineWidth = 0.6;   // vertical seam lines
    for (const fx of [-0.55, -0.28, 0.28, 0.55]) { ctx.beginPath(); ctx.moveTo(s.wb * fx, s.yb); ctx.lineTo(s.wt * fx, s.yt); ctx.stroke(); }
    glowOff();
  };
  if (opts.only != null) { seg(N1_STAGES[opts.only]); ctx.restore(); return; }
  const lat = (yb, yt, wb, wt) => {   // red open-lattice interstage truss
    ctx.strokeStyle = RED; glowOn(3, "#ff3a3a"); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-wb, yb); ctx.lineTo(-wt, yt); ctx.moveTo(wb, yb); ctx.lineTo(wt, yt); ctx.stroke();   // outer legs
    ctx.beginPath(); ctx.moveTo(-wb, yb); ctx.lineTo(wb, yb); ctx.moveTo(-wt, yt); ctx.lineTo(wt, yt); ctx.stroke();   // rings
    ctx.lineWidth = 1.0;
    const NB = 4;
    for (let i = 0; i < NB; i++) {
      const y0 = yb + (yt - yb) * (i / NB), y1 = yb + (yt - yb) * ((i + 1) / NB);
      const w0 = wb + (wt - wb) * (i / NB), w1 = wb + (wt - wb) * ((i + 1) / NB);
      ctx.beginPath(); ctx.moveTo(-w0, y0); ctx.lineTo(w1, y1); ctx.moveTo(w0, y0); ctx.lineTo(-w1, y1); ctx.stroke();   // X cross-brace
    }
    glowOff();
  };
  // payload fairing (over the LOK + LK) + launch-escape tower, on top of the topmost stage
  if (nose) {
    const t = N1_STAGES[N - 1];
    glowOn(3, "#cfe6ff"); ctx.strokeStyle = WHITE; ctx.lineWidth = 1.6;
    ctx.beginPath();
    ctx.moveTo(-t.wt, t.yt); ctx.lineTo(-3.5, t.yt - 16); ctx.lineTo(-2.5, t.yt - 30); ctx.lineTo(0, t.yt - 44); ctx.lineTo(2.5, t.yt - 30); ctx.lineTo(3.5, t.yt - 16); ctx.lineTo(t.wt, t.yt);
    ctx.stroke();
    ctx.lineWidth = 1.3; ctx.beginPath(); ctx.moveTo(0, t.yt - 44); ctx.lineTo(0, t.yt - 58); ctx.stroke(); glowOff();
    glowOn(3, "#ff3a3a"); ctx.fillStyle = RED; ctx.beginPath(); ctx.arc(0, t.yt - 60, 2, 0, Math.PI * 2); ctx.fill(); glowOff();
    // a window on the payload capsule (the LOK Soyuz rides here, at the very top)
    glowOn(5, "#cfe6ff"); ctx.strokeStyle = "#dfeaff"; ctx.lineWidth = 1.3; ctx.beginPath(); ctx.arc(0, t.yt - 17, 2.1, 0, Math.PI * 2); ctx.stroke(); glowOff();
  }
  // stages from the top down, plus a red lattice between each pair of still-attached stages
  for (let i = N - 1; i >= gone; i--) {
    seg(N1_STAGES[i]);
    if (i > gone) lat(N1_STAGES[i - 1].yt, N1_STAGES[i].yb, N1_STAGES[i - 1].wt, N1_STAGES[i].wb);
  }
  // red СССР stacked down Block A (only while it's still attached)
  if (gone <= 0) {
    glowOn(2, "#ff3a3a"); ctx.fillStyle = RED;
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.font = "bold 12px 'Courier New', monospace";
    const ll = cccp();
    for (let i = 0; i < ll.length; i++) ctx.fillText(ll[i], 0, -24 + i * 12);
    glowOff();
  }
  // ring of engine bells across the base of Block A (suggesting the N1's many-engine first stage)
  if (gone <= 0) {
    ctx.strokeStyle = GRAY; glowOn(4, "#cdd6e2"); ctx.lineWidth = 1.1;
    const by = N1_STAGES[0].yb, bw = N1_STAGES[0].wb;
    for (let k = -2.5; k <= 2.5; k++) { const bx = k * (bw - 4) / 2.5; ctx.beginPath(); ctx.moveTo(bx - 2.4, by); ctx.lineTo(bx - 1.4, by + 5); ctx.lineTo(bx + 1.4, by + 5); ctx.lineTo(bx + 2.4, by); ctx.stroke(); }
    glowOff();
  }
  // red star on the lowest white upper stage that's still present
  { const si = Math.max(gone, 1), s = N1_STAGES[Math.min(si, N - 1)]; drawStar(0, (s.yb + s.yt) / 2, 5, 2.1, "#e22"); }
  // engine flame at the current lowest remaining stage's base (big, fiery thrust)
  if (flame) {
    const s = N1_STAGES[Math.min(gone, N - 1)];
    drawEngineFlame(0, s.yb + 4, s.wb * 0.62, gone === 0 ? 86 : gone === 1 ? 66 : gone === 2 ? 50 : 38);
  }
  ctx.restore();
}

function buildLaunchSurface() {
  launchSurface = { buildings: [], sheds: [], tanks: [], towers: [], dishes: [], cacti: [], dunes: [], workers: [] };

  launchSurface.clouds = [];

  // offices / assembly buildings flanking the pad
  for (const x of [-450, -230, 230, 305, 385, 460]) launchSurface.buildings.push({ x: x + rand(-10, 10), w: rand(52, 86), h: rand(42, 112), red: Math.random() < 0.3 });
  // a wide flat-roofed building that hosts the propaganda billboard (sized so the banner fits fully on it)
  launchSurface.billboard = { x: -360, w: 156, h: rand(96, 120) };
  launchSurface.buildings.push({ x: launchSurface.billboard.x, w: launchSurface.billboard.w, h: launchSurface.billboard.h, red: false });
  // long low white hangars (the spaceport's assembly sheds)
  for (const h of [{ x: -650, w: 170, h: 54 }, { x: -415, w: 130, h: 46 }, { x: 360, w: 140, h: 48 }, { x: 590, w: 185, h: 58 }]) launchSurface.sheds.push(h);
  // big white fuel-tank farms flanking the pad (more of them — the propellant vibe)
  for (const x of [-205, -168, -131, 131, 168, 205, -560, -512, 530, 578]) launchSurface.tanks.push({ x: x + rand(-5, 5), r: rand(15, 26) });
  // lattice antenna/floodlight towers

  const hInner = rand(150, 200), hOuter = rand(150, 210);
  launchSurface.towers.push({ x: -95, h: hInner }, { x: 100, h: hInner }, { x: -540, h: hOuter }, { x: 530, h: hOuter });
  // radar dishes
  launchSurface.dishes.push({ x: -265 }); launchSurface.dishes.push({ x: 345 });
  // a back row of industrial buildings (drawn behind, shorter)
  launchSurface.bgBuildings = [];
  for (let x = -560; x <= 560; x += rand(70, 120)) { if (Math.abs(x) < 110) continue; launchSurface.bgBuildings.push({ x, w: rand(40, 78), h: rand(28, 78) }); }
  // distant background hills (a steppe ridgeline)
  launchSurface.bgHills = [];

  // workers on the apron
  for (let i = 0; i < 11; i++) launchSurface.workers.push({ x: rand(-150, 150), ph: rand(0, 6.3) });
  // more cacti, spread further out across the steppe
  for (let x = -3200; x <= 3200; x += rand(90, 180)) { if (Math.abs(x) < 620) continue; if (Math.random() < 0.78) launchSurface.cacti.push({ x, h: rand(9, 22), arm: Math.random() < 0.5 }); }
  for (let i = 0; i < 9; i++) launchSurface.dunes.push({ x: rand(-2600, 2600), w: rand(220, 420), h: rand(6, 16) });
  // a small shallow pond out on the steppe
  launchSurface.pond = { x: (Math.random() < 0.5 ? -1 : 1) * rand(820, 1500), w: rand(130, 210) };

  // ===== WEST: hamlet → forest → town (one church) → long empty steppe → Moscow, far away =====
  const HAMLET = -5000, TOWN = -10000, MOSCOW_C = -19000;
  // forest: light near the pad, a thick band between hamlet and town, thinning over the run to Moscow
  launchSurface.westTrees = [];
  for (let x = -3000; x >= -23500; x -= rand(45, 140)) {
    let dens = clamp((-x - 2800) / 4000, 0, 1) * 0.45;
    if (x < -5400 && x > -9200) dens = 0.9;             // thick forest between hamlet and town
    else if (x < -10800 && x > -16500) dens = 0.22;     // thinning on the long steppe to Moscow
    if (x < MOSCOW_C + 900 && x > MOSCOW_C - 900) continue;   // keep the city/Red Square clear of trees
    if (Math.random() < 0.1 + dens * 0.72) launchSurface.westTrees.push({ x: x + rand(-26, 26), h: rand(16, 48), pine: Math.random() < 0.62, sway: rand(0, 6.3) });
  }
  launchSurface.westPonds = [];
  for (let x = -5800; x >= -16500; x -= rand(800, 1700)) launchSurface.westPonds.push({ x: x + rand(-160, 160), w: rand(150, 360) });

  // the town: wooden houses around a single Orthodox church
  launchSurface.townBuildings = [];
  for (let x = TOWN - 720; x <= TOWN + 720; x += rand(70, 140)) { if (Math.abs(x - TOWN) < 120) continue; launchSurface.townBuildings.push({ x, w: rand(36, 64), h: rand(34, 84), wood: Math.random() < 0.6 }); }
  launchSurface.churches = [{ x: TOWN, scale: 1.8, destroyed: false }];
  // Moscow — Red Square kept compact so the Kremlin + St Basil's frame together

    mausoleumX: MOSCOW_C + 80, flagX: MOSCOW_C - 250, cannonX: MOSCOW_C - 310,

  launchSurface.westTowers = [];
  for (const tx of [-15400, -16200, -17100]) launchSurface.westTowers.push({ x: tx, h: rand(240, 340) });
  launchSurface.hamletChurch = { x: HAMLET };
  // people: town, across Moscow, and a dense crowd in Red Square (who celebrate on landing)
  launchSurface.westPeople = [];
  for (let i = 0; i < 8; i++) launchSurface.westPeople.push({ x: TOWN + rand(-700, 700), ph: rand(0, 6.3) });
  for (let i = 0; i < 18; i++) launchSurface.westPeople.push({ x: MOSCOW_C + rand(-2400, 2400), ph: rand(0, 6.3) });
  for (let i = 0; i < 24; i++) launchSurface.westPeople.push({ x: rand(MOSCOW_C - 430, MOSCOW_C - 30), ph: rand(0, 6.3), plaza: true });   // crowd kept left of the mausoleum sign
  // beyond Moscow, the Caucasus: ranges growing taller + snowier, ending at Mount Elbrus (the westmost + biggest)
  launchSurface.mountains = [];
  for (let x = -22200; x >= -27000; x -= rand(450, 850)) {
    const f = clamp((-x - 22200) / 4400, 0, 1);
    launchSurface.mountains.push({ x: x + rand(-160, 160), w: rand(620, 1150) * (0.7 + f), h: (110 + f * 230) * rand(0.82, 1.1), snow: f });
  }
  launchSurface.elbrus = { x: -27600 };

  // collidable structures (full crash + the struck building blows up)
  launchSurface.cityBuildings = [];
  for (const b of launchSurface.hamlet) launchSurface.cityBuildings.push(Object.assign(b, { name: "A HAMLET" }));
  for (const b of launchSurface.townBuildings) launchSurface.cityBuildings.push(Object.assign(b, { name: "THE TOWN" }));
  for (const b of launchSurface.moscow.buildings) launchSurface.cityBuildings.push(Object.assign(b, { name: "MOSCOW" }));
  // St Basil's (smaller): wide low cluster + narrow tall tent
  launchSurface.cityBuildings.push({ x: launchSurface.moscow.basilsX - 98, w: 196, h: 170, name: "ST BASIL'S", landmark: "basils" });
  launchSurface.cityBuildings.push({ x: launchSurface.moscow.basilsX - 31, w: 62, h: 230, name: "ST BASIL'S", landmark: "basils" });
  // Kremlin: low wide wall + narrow tall Spasskaya (on the plaza-facing side)
  launchSurface.cityBuildings.push({ x: launchSurface.moscow.kremlinX - 180, w: 360, h: 86, name: "THE KREMLIN", landmark: "kremlin" });
  launchSurface.cityBuildings.push({ x: launchSurface.moscow.spasskayaX - 22, w: 44, h: 225, name: "THE KREMLIN", landmark: "kremlin" });
  launchSurface.cityBuildings.push({ x: launchSurface.moscow.mausoleumX - 62, w: 124, h: 78, name: "LENIN'S MAUSOLEUM" });
  // Mount Elbrus is collidable (a tall central mass you must really hit) — but it doesn't blow up
  launchSurface.cityBuildings.push({ x: launchSurface.elbrus.x - 240, w: 480, h: 460, name: "MOUNT ELBRUS", noBlow: true });

  // ===== EAST: green → forest → the Pacific → Golden Gate + Marin → San Francisco → the Bay =====
  const SF_C = 15500;
  launchSurface.eastTrees = [];
  for (let x = 2400; x <= 5000; x += rand(55, 140)) { if (Math.random() < 0.55) launchSurface.eastTrees.push({ x: x + rand(-22, 22), h: rand(16, 42), pine: Math.random() < 0.6, sway: rand(0, 6.3) }); }
  launchSurface.ocean = { x1: 5000, x2: 13050 };                       // the Pacific to cross (meets the bridge)
  launchSurface.goldenGate = { x: 13500, span: 700 };                  // bridge connects straight into SF
  launchSurface.boats = [{ x: 8200, kind: "sail" }, { x: 10400, kind: "warship" }];
  launchSurface.dock = { x: 4942 };                                    // a fishing pier reaching out from the near (Russia-side) shore
  const sf = launchSurface.sf = {

    starX: SF_C + 300, palaceX: SF_C - 1690, sutroX: SF_C - 240,
    plazaX1: SF_C - 95, plazaX2: SF_C + 95,
    pavedX1: SF_C - 1700, pavedX2: SF_C + 1700,
    bayX1: SF_C + 1750, bayX2: SF_C + 4400,
    trees: [SF_C - 78, SF_C + 58, SF_C + 88],

  };
  // a few medium "old SF" buildings around Union Square (the only sizeable ones)

    if (Math.abs(x - sf.palaceX) < 120) continue;                      // leave room for the Palace of Fine Arts
    if (sf.buildings.some(b => Math.abs(b.x - x) < 40)) continue;
    sf.houses.push({ x, w: rand(20, 30), h: rand(26, 46), col: vcol[(Math.random() * vcol.length) | 0], style: (Math.random() * 3) | 0 });
  }
  // the famous row of Painted Ladies on the hill behind Union Square + scattered houses up the slopes
  sf.hillHouses = [];
  const ladyCols = ["#e8c89c", "#dcb0c2", "#bcd6c8", "#ead8a4", "#c8d2e2", "#cdb6d6", "#e0c2a4"];
  for (let i = 0; i < 7; i++) sf.hillHouses.push({ off: -176 + i * 56, col: ladyCols[i], w: 30, hgt: 58, lady: true });
  for (let i = -8; i <= 8; i++) if (Math.abs(i) > 3) sf.hillHouses.push({ off: i * 84 + rand(-10, 10), col: vcol[(Math.random() * vcol.length) | 0], w: rand(20, 28), hgt: rand(22, 34) });
  for (let i = 0; i < 32; i++) launchSurface.westPeople.push({ x: rand(SF_C - 240, SF_C + 240), ph: rand(0, 6.3), plaza2: true });
  // SF collidable: the few towers + the medium buildings (small Victorians are scenery)
  for (const b of sf.buildings) launchSurface.cityBuildings.push(Object.assign(b, { name: "SAN FRANCISCO" }));
  launchSurface.cityBuildings.push({ x: sf.salesforceX - 43, w: 86, h: 330, name: "SALESFORCE TOWER" });
  launchSurface.cityBuildings.push({ x: sf.transamX - 28, w: 56, h: 235, name: "THE TRANSAMERICA PYRAMID" });
  launchSurface.cityBuildings.push({ x: sf.fiveX - 35, w: 70, h: 195, name: "555 CALIFORNIA ST" });
  // Sather Tower (the Berkeley Campanile) tucked behind the Golden Gate Bridge in the background
  sf.satherX = SF_C - 1930;
  // the Sierra Nevada beyond the bay — ranges growing taller + snowier eastward, ending at the biggest peak
  launchSurface.eastMountains = [];
  for (let x = SF_C + 5200; x <= SF_C + 10400; x += rand(450, 850)) {
    const f = clamp((x - (SF_C + 5200)) / 4600, 0, 1);
    launchSurface.eastMountains.push({ x: x + rand(-160, 160), w: rand(620, 1150) * (0.7 + f), h: (110 + f * 250) * rand(0.82, 1.1), snow: 0.4 + f * 0.6 });
  }
  launchSurface.sierra = { x: SF_C + 10800 };   // the biggest, easternmost peak (skiers, chalet, barn, US flag)
  launchSurface.cityBuildings.push({ x: launchSurface.sierra.x - 240, w: 480, h: 500, name: "THE SIERRA NEVADA", noBlow: true });

  // ----- background rolling hills + scattered trees across the long open stretches (so nothing is bare) -----
  launchSurface.bgScenery = [];
  const addHills = (x0, x1, baseH, treeCol, treeChance, col) => {
    for (let x = x0; x <= x1; x += rand(420, 820)) launchSurface.bgScenery.push({ x: x + rand(-150, 150), w: rand(600, 1150), h: baseH * rand(0.7, 1.2), kind: "hill", col });
    if (treeChance) for (let x = x0; x <= x1; x += rand(120, 260)) if (Math.random() < treeChance) launchSurface.bgScenery.push({ x: x + rand(-40, 40), h: rand(14, 30), kind: "tree", col: treeCol });
  };
  addHills(-3500, -9300, 70, "#2f6a30", 0.6);          // west steppe → forest
  addHills(-10600, -16500, 60, "#2f6a30", 0.6);        // long run to Moscow
  addHills(2000, 4900, 60, "#357a35", 0.6);            // east green belt
  // San Francisco is hilly — rolling hills behind the whole city
  addHills(SF_C - 1700, SF_C + 1700, 110, "#357a35", 0, "#5e7048");
  // a couple of big hills on the western steppe
  launchSurface.bgScenery.push({ x: -6800, w: 1700, h: 230, kind: "hill", col: "#3f5e34" });
  launchSurface.bgScenery.push({ x: -13800, w: 1900, h: 270, kind: "hill", col: "#3f5e34" });
  // green hills (about half the size of the Marin headlands) behind the west part of the city
  addHills(sf.palaceX - 200, SF_C - 250, 175, "#357a35", 0, "#4c7a42");
}
function startLaunch() {
  launching = true; homecoming = null; lzoom = 1;
  const raiseDur = (isFinite(countdown.duration) && countdown.duration > 1) ? countdown.duration * 1000 : RAISE_DUR_DEFAULT;
  // the rocket starts lying horizontal on the erector and is raised to vertical during the countdown
  rocket = { x: 0, y: 0, vx: 0, vy: 0, angle: Math.PI / 2, fuel: LAUNCH_FUEL, throttle: 0, phase: "raise", stage: "rocket", lifted: false, orbitTime: 0, msg: "", lastBeepIdx: -1, raiseStart: performance.now(), raiseDur };
  launchStars = null; launchParts = []; launchFireballs = []; flungPeople = []; launchDiscards = []; launchFlash = 0;
  try { rocketEngine.pause(); rocketEngine.currentTime = 0; alarm.pause(); } catch (e) {}
  buildLaunchSurface();
  try { countdown.currentTime = 0; countdown.play().catch(() => {}); } catch (e) {}
}
// the chosen homecoming: drop the Soyuz+lander high over the chosen approach and fly it down into the city
function startHomecoming(side) {
  homecoming = side;
  anthemActive = false; anthem.pause(); usAnthem.pause();
  if (masterGain) masterGain.gain.value = 0.6;
  launching = true; state = "play";   // launching takes precedence over the cutscene in update/render
  buildLaunchSurface();
  const targetX = side === "hero" ? launchSurface.moscow.redSquareX + 4600 : launchSurface.sf.center - 5200;
  const vx0 = side === "hero" ? -45 : 45;   // already drifting toward the city
  rocket = { x: targetX, y: 1350, vx: vx0, vy: -6, angle: 0, fuel: 1000, throttle: 0, phase: "fly", stage: "soyuz", lifted: true, orbitTime: 0, msg: "", lastBeepIdx: -1 };
  lzoom = 1;
  launchStars = null; launchParts = []; launchFireballs = []; flungPeople = []; launchDiscards = []; launchFlash = 0;
  startBgm();
  try { rocketEngine.pause(); rocketEngine.currentTime = 0; alarm.pause(); } catch (e) {}

  for (let i = 0; i < 170; i++) { const a = rand(0, Math.PI * 2), s = rand(60, 480); r.parts.push({ x: r.x, y: r.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.8, 2.6), kind: "boom", col: fc[(Math.random() * fc.length) | 0] }); }

function updateMoonClimb(dt) {
  const r = moonClimb;
  for (const p of r.parts) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += (p.kind === "smoke" ? 8 : -MC_G * 3.5) * dt; p.life -= dt; }

  const docking = performance.now() - r.dockT < 1600;   // brief dock beat before you take control
  if (r.phase === "fly" && !docking) {
    if (keys["arrowleft"]) r.angle -= MC_ROT * dt;
    if (keys["arrowright"]) r.angle += MC_ROT * dt;
    const thrustHeld = (keys["arrowup"] || keys[" "]) && r.fuel > 0;
    const tgt = thrustHeld ? 1 : 0;
    if (r.throttle < tgt) r.throttle = Math.min(1, r.throttle + 2.6 * dt);
    else r.throttle = Math.max(0, r.throttle - 3.9 * dt);
    let thrust = 0;
    if (r.throttle > 0.02 && r.fuel > 0) {
      if (!r.igniteTime) r.igniteTime = performance.now();
      thrust = MC_THRUST * r.throttle;
      r.fuel -= L_FUEL_BURN * r.throttle * dt; if (r.fuel < 0) r.fuel = 0;
      if (Math.random() < r.throttle) spawnMoonExhaust();
    }
    if (audioReady && thrustGain) {

      thrustGain.gain.setTargetAtTime(on ? 0.4 : 0, audio.currentTime, 0.05);
      thrustFilter.frequency.setTargetAtTime(300 + r.throttle * 600, audio.currentTime, 0.05);

    r.x += r.vx * dt; r.y += r.vy * dt;
    if (r.y <= 0) { if (r.vy < -70) moonClimbCrash("РАЗБИЛСЯ О ЛУНУ"); else { r.y = 0; if (r.vy < 0) r.vy = 0; } }
    if (r.y >= MC_ORBIT_ALT && Math.abs(r.vx) >= MC_ORBIT_SPEED) {
      r.phase = "orbit"; r.orbitTime = performance.now();
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.2, 0.24, "triangle"), i * 130));
    }
  } else if (r.phase === "orbit") {
    r.x += r.vx * dt; r.y += r.vy * dt;
    if (performance.now() - r.orbitTime > 1600) {
      if (audioReady && thrustGain) thrustGain.gain.setTargetAtTime(0, audio.currentTime, 0.05);

    }
  }
}

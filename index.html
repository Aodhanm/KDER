    if (!introLanderSnd) {
      introLanderSnd = true;
      if (audioReady && thrustGain) { thrustGain.gain.setTargetAtTime(0.5, audio.currentTime, 0.03); thrustFilter.frequency.setTargetAtTime(640, audio.currentTime, 0.03); }
    }
    if (el - 0.80 * INTRO_DUR > 1000) { introLanderDone = true; if (audioReady && thrustGain) thrustGain.gain.setTargetAtTime(0, audio.currentTime, 0.06); }
  }
  // the Moon grows as the camera closes in
  drawMoonAt(cx, H * 0.40 - p * 16, 40 + (p * p) * 250);

  const bodySc = 3.0, bodyY = H * 0.56, topY = bodyY - 42 * bodySc;   // open-top plane after staging
  if (p < 0.26) {
    // ASCENT
    const ap = p / 0.26;
    ctx.save(); ctx.translate(cx, H * 0.84 - ap * H * 0.28); ctx.scale(bodySc, bodySc); drawRocket(true, 0); ctx.restore();
  } else if (p < 0.35) {
    // BOOSTER STAGING — the four strap-ons fly off, bright flash + a longer separation bang
    if (!introStaged) { introStaged = true; stagingSound(); }
    const bp = (p - 0.26) / 0.09;
    ctx.save(); ctx.translate(cx, bodyY); ctx.scale(bodySc, bodySc); drawRocket(false, bp * 24); ctx.restore();
    ctx.save(); ctx.globalAlpha = (1 - bp) * 0.6; ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H); ctx.restore();
  } else if (p < 0.60) {
    // SUSTAINED CORE BURN — the upper stage keeps thrusting for a couple seconds, nose still on
    ctx.save(); ctx.translate(cx, bodyY); ctx.scale(bodySc, bodySc); drawRocket(true, 30); ctx.restore();
  } else if (p < 0.80) {
    // NOSE SEPARATION — the fairing breaks off the top, propels up then falls away into space;
    // the Soyuz (with lander) rises out of the open top while the core keeps burning
    if (!introNosed) {
      introNosed = true;
      undockThrusterSound();   // same thruster whoosh as the lander ejecting from the Soyuz
      introDebris = [];
      for (let i = 0; i < 16; i++) introDebris.push({ vx: rand(-70, 70), vy: rand(-95, -10), len: rand(3, 9), rot: rand(0, 6.28), vrot: rand(-6, 6) });
    }
    const np = (p - 0.60) / 0.20;
    ctx.save(); ctx.translate(cx, bodyY); ctx.scale(bodySc, bodySc); drawRocket(true, 30, true); ctx.restore();
    // the Soyuz+lander stack sliding up out of the body
    const syc = (topY + 14) - np * ((topY + 14) - H * 0.30), ssc = 0.9 + np * 0.3;
    ctx.save(); ctx.translate(cx, syc); ctx.scale(ssc, ssc); drawSoyuzAt(0, 0); drawDockedLander(); ctx.restore();
    // the detached nose cone — propels up a little, then tumbles slowly back down into space
    let coneOff;
    if (np < 0.3) coneOff = -50 * (np / 0.3);
    else coneOff = -50 + Math.pow((np - 0.3) / 0.7, 2) * 230;   // slower descent
    ctx.save();
    ctx.translate(cx + np * 26, topY + coneOff); ctx.rotate(np * 1.2); ctx.scale(bodySc, bodySc);
    drawNoseCone();
    ctx.restore();
    // little bits of debris flung off at separation (like the lander undock puff)
    ctx.save(); glowOn(6);
    for (const d of introDebris) {
      const x = cx + d.vx * np, y = topY + d.vy * np + 130 * np * np;
      ctx.globalAlpha = clamp(1 - np, 0, 1) * 0.9;
      ctx.strokeStyle = "#cdd2d8"; ctx.lineWidth = 1.6; ctx.lineCap = "round";
      const a = d.rot + d.vrot * np, dx = Math.cos(a) * d.len, dy = Math.sin(a) * d.len;
      ctx.beginPath(); ctx.moveTo(x - dx / 2, y - dy / 2); ctx.lineTo(x + dx / 2, y + dy / 2); ctx.stroke();
    }
    ctx.globalAlpha = 1; ctx.lineCap = "butt"; glowOff(); ctx.restore();
    // a small separation flash at the break
    if (np < 0.25) { ctx.save(); ctx.globalAlpha = (0.25 - np) * 1.4; ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H); ctx.restore(); }
  } else {
    // STACK descends into the growing Moon, shrinking until it vanishes in a neon twinkle
    const lp = (p - 0.80) / 0.20;
    const my = H * 0.40 - p * 16;               // Moon centre (matches drawMoonAt above)
    const e = lp * lp * (3 - 2 * lp);           // smoothstep
    const ly = H * 0.30 + (my - H * 0.30) * e;  // descend toward the Moon
    const sc = Math.max(0, 1.2 - 1.45 * e);     // shrink into it
    if (sc > 0.04) {
      const baseY = ly + 63 * sc;
      const fl = 22 * sc + Math.sin(performance.now() / 60) * 6;
      ctx.save();
      glowOn(14, "#ff7a2a"); ctx.fillStyle = "rgba(255,150,50,0.9)";
      ctx.beginPath();
      ctx.moveTo(cx - 4 * sc, baseY); ctx.lineTo(cx + 4 * sc, baseY); ctx.lineTo(cx, baseY + fl);
      ctx.closePath(); ctx.fill(); glowOff();
      ctx.restore();
      ctx.save();
      ctx.translate(cx, ly); ctx.scale(sc, sc);
      drawSoyuzAt(0, 0);
      drawDockedLander();
      ctx.restore();
    }
    // neon-white twinkle the instant it disappears into the Moon (same as the Earth-return flash)
    const nowF = performance.now();
    if (!introFlashed && sc <= 0.04) { introFlashed = true; introFlashTime = nowF; neonBeep(); }
    if (introFlashed) {
      const fe = (nowF - introFlashTime) / 1000;
      if (fe < 0.5) {
        const fa = 1 - fe / 0.5;
        const fg = ctx.createRadialGradient(cx, my, 0, cx, my, 200);
        fg.addColorStop(0, "rgba(238,246,255," + (0.95 * fa).toFixed(2) + ")");
        fg.addColorStop(0.5, "rgba(190,212,255," + (0.5 * fa).toFixed(2) + ")");
        fg.addColorStop(1, "rgba(190,212,255,0)");
        ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(cx, my, 200, 0, Math.PI * 2); ctx.fill();
      }
    }
  }

  ctx.save();
  ctx.fillStyle = "#788"; ctx.textAlign = "center"; ctx.font = "13px 'Courier New', monospace";
  ctx.fillText(tr("ENTER — ПРОПУСТИТЬ"), cx, H - 24);
  ctx.restore();
  if (p >= 1) { stopIntroSounds(); intro = false; newGame(false); }
}

// the N1 fly-to-the-Moon cutscene: stages drop piece by piece (Block A → B → V), each new stage
// firing its own engine, then the fairing jettisons and the LOK + LK deploy and fly down into the Moon
function drawIntroN1(el, p, cx) {
  if (introN1Token !== introStart) { introN1Token = introStart; introStage1 = introStage2 = introStage3 = false; }   // fresh run
  drawMoonAt(cx, H * 0.40 - p * 16, 40 + (p * p) * 250);
  const bodyY = H * 0.60, bodySc = 1.35;
  // engine SFX while any main stage burns (louder for the N1); then off
  if (!introRocketDone) {
    if (p < 0.64) { if (!introRocketSnd) { introRocketSnd = true; try { rocketEngine.currentTime = 0; rocketEngine.volume = 0.95; rocketEngine.play().catch(() => {}); } catch (e) {} } }
    else { introRocketDone = true; try { rocketEngine.pause(); rocketEngine.volume = 0; rocketEngine.currentTime = 0; } catch (e) {} }
  }
  // LK thruster SFX as the stack fires down into the Moon
  if (!introLanderDone && p >= 0.74) {
    if (!introLanderSnd) { introLanderSnd = true; if (audioReady && thrustGain) { thrustGain.gain.setTargetAtTime(0.5, audio.currentTime, 0.03); thrustFilter.frequency.setTargetAtTime(640, audio.currentTime, 0.03); } }
    if (el - 0.74 * INTRO_DUR > 1200) { introLanderDone = true; if (audioReady && thrustGain) thrustGain.gain.setTargetAtTime(0, audio.currentTime, 0.06); }
  }
  const stack = (gone, nose, flame) => { ctx.save(); ctx.translate(cx, bodyY); ctx.scale(bodySc, bodySc); drawN1({ gone, nose, flame }); ctx.restore(); };
  const fall = (idx, prog) => { ctx.save(); ctx.globalAlpha = clamp(1 - prog, 0, 1); ctx.translate(cx + prog * 26, bodyY + 90 + prog * 320); ctx.rotate(prog * 0.6); ctx.scale(bodySc * 0.95, bodySc * 0.95); drawN1({ only: idx }); ctx.restore(); };
  const flash = (a) => { if (a > 0) { ctx.save(); ctx.globalAlpha = clamp(a, 0, 1); ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, W, H); ctx.restore(); } };

  if (p < 0.12) {                                  // ASCENT — full stack, Block A burning
    stack(0, true, true);
  } else if (p < 0.18) {                           // STAGE 1 SEP — Block A drops, Block B ignites
    if (!introStage1) { introStage1 = true; stagingSound(); }
    const sp = (p - 0.12) / 0.06; fall(0, sp); stack(1, true, true); flash((1 - sp) * 0.5);
  } else if (p < 0.30) {                           // STAGE 2 BURN
    stack(1, true, true);
  } else if (p < 0.36) {                           // STAGE 2 SEP — Block B drops, Block V ignites
    if (!introStage2) { introStage2 = true; stagingSound(); }
    const sp = (p - 0.30) / 0.06; fall(1, sp); stack(2, true, true); flash((1 - sp) * 0.5);
  } else if (p < 0.48) {                           // STAGE 3 BURN
    stack(2, true, true);
  } else if (p < 0.54) {                           // STAGE 3 SEP — Block V drops, Block G ignites
    if (!introStage3) { introStage3 = true; stagingSound(); }
    const sp = (p - 0.48) / 0.06; fall(2, sp); stack(3, true, true); flash((1 - sp) * 0.5);
  } else if (p < 0.64) {                           // STAGE 4 BURN (Block G)
    stack(3, true, true);
  } else if (p < 0.74) {                           // FAIRING JETTISON + LOK/LK DEPLOY
    if (!introNosed) { introNosed = true; undockThrusterSound(); }
    const np = (p - 0.64) / 0.10;
    stack(3, false, np < 0.5);
    const topY = bodyY + N1_STAGES[N1_STAGES.length - 1].yt * bodySc, syc = topY - np * 70, ssc = 0.9 + np * 0.25;
    ctx.save(); ctx.translate(cx, syc); ctx.scale(ssc, ssc); drawSoyuzAt(0, 0); drawDockedLander(); ctx.restore();
    flash((0.2 - np) * 1.2);
  } else {                                         // LOK+LK descend into the Moon, vanish in a twinkle
    const lp = (p - 0.74) / 0.26, my = H * 0.40 - p * 16;
    const e = lp * lp * (3 - 2 * lp), ly = H * 0.30 + (my - H * 0.30) * e, sc = Math.max(0, 1.2 - 1.45 * e);
    if (sc > 0.04) {
      const baseY = ly + 63 * sc, fl = 22 * sc + Math.sin(performance.now() / 60) * 6;
      ctx.save(); glowOn(14, "#ff7a2a"); ctx.fillStyle = "rgba(255,150,50,0.9)";
      ctx.beginPath(); ctx.moveTo(cx - 4 * sc, baseY); ctx.lineTo(cx + 4 * sc, baseY); ctx.lineTo(cx, baseY + fl); ctx.closePath(); ctx.fill(); glowOff(); ctx.restore();
      ctx.save(); ctx.translate(cx, ly); ctx.scale(sc, sc); drawSoyuzAt(0, 0); drawDockedLander(); ctx.restore();
    }
    const nowF = performance.now();
    if (!introFlashed && sc <= 0.04) { introFlashed = true; introFlashTime = nowF; neonBeep(); }
    if (introFlashed) {
      const fe = (nowF - introFlashTime) / 1000;
      if (fe < 0.5) {
        const fa = 1 - fe / 0.5;
        const fg = ctx.createRadialGradient(cx, my, 0, cx, my, 200);
        fg.addColorStop(0, "rgba(238,246,255," + (0.95 * fa).toFixed(2) + ")");
        fg.addColorStop(0.5, "rgba(190,212,255," + (0.5 * fa).toFixed(2) + ")");
        fg.addColorStop(1, "rgba(190,212,255,0)");
        ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(cx, my, 200, 0, Math.PI * 2); ctx.fill();
      }
    }
  }
  ctx.save();
  ctx.fillStyle = "#788"; ctx.textAlign = "center"; ctx.font = "13px 'Courier New', monospace";
  ctx.fillText(tr("ENTER — ПРОПУСТИТЬ"), cx, H - 24);
  ctx.restore();
  if (p >= 1) { stopIntroSounds(); intro = false; newGame(false); }
}

// position + tangent on a tilted elliptical orbit at parameter t (for title animations)
function orbitPos(mx, my, rx, ry, rot, t) {
  const c = Math.cos(rot), s = Math.sin(rot);
  const bx = Math.cos(t) * rx, by = Math.sin(t) * ry;
  const dbx = -Math.sin(t) * rx, dby = Math.cos(t) * ry;
  return {
    x: mx + bx * c - by * s,
    y: my + bx * s + by * c,
    tang: Math.atan2(dbx * s + dby * c, dbx * c - dby * s),
    behind: Math.sin(t) < 0
  };
}

// --- Title meteor: the same fast glowing streak as the in-game flyby, behind everything ---
function spawnTitleAsteroid() {
  const edge = (Math.random() * 4) | 0;
  let x, y;
  if (edge === 0) { x = -50; y = rand(20, H * 0.78); }
  else if (edge === 1) { x = W + 50; y = rand(20, H * 0.78); }
  else if (edge === 2) { x = rand(0, W); y = -50; }
  else { x = rand(0, W); y = H + 50; }
  const tx = rand(W * 0.25, W * 0.75), ty = rand(H * 0.12, H * 0.6);
  const ang = Math.atan2(ty - y, tx - x), sp = rand(440, 640);   // much faster than before
  return { x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, r: 5 };
}
function drawTitleAsteroid(a) {
  const sp = Math.hypot(a.vx, a.vy) || 1, ux = a.vx / sp, uy = a.vy / sp;   // travel direction
  ctx.save();
  glowOn(8, "#ffd0a0");
  ctx.strokeStyle = "rgba(255,185,125,0.85)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(a.x - ux * 40, a.y - uy * 40); ctx.stroke();   // trail behind
  ctx.fillStyle = "#ecd6b4";
  ctx.beginPath(); ctx.arc(a.x, a.y, 3.6, 0, Math.PI * 2); ctx.fill();
  glowOff();
  ctx.restore();
}
function titleBoom(x, y) {
  try { explosionSound(); } catch (e) {}
  const cols = ["#ffd24a", "#ff8a2a", "#ff4422", "#ffe9a0"];
  for (let i = 0; i < 26; i++) { const a = rand(0, 6.28), s = rand(40, 200); titleBits.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.5, 1.3), max: 1.3, col: cols[(Math.random() * cols.length) | 0], sz: rand(1.5, 3.2) }); }
  for (let i = 0; i < 8; i++) { const a = rand(0, 6.28), s = rand(15, 70); titleBits.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: rand(0.8, 1.6), max: 1.6, col: "#555", sz: rand(2, 3) }); }
}

// Soviet space-poster-style title screen
function drawTitle() {
  const now = performance.now();
  const dt = titleLastT ? Math.min(0.05, (now - titleLastT) / 1000) : 0; titleLastT = now;
  ctx.save();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";

  // Asteroid: occasional, one at a time, from any edge — drawn FIRST so it stays behind everything
  if (nextTitleAst === 0) nextTitleAst = now + rand(2500, 6000);
  if (!titleAsteroid && now > nextTitleAst) titleAsteroid = spawnTitleAsteroid();
  if (titleAsteroid) {
    const a = titleAsteroid; a.x += a.vx * dt; a.y += a.vy * dt; a.rot += a.vrot * dt;
    if (a.x < -60 || a.x > W + 60 || a.y < -60 || a.y > H + 60) { titleAsteroid = null; nextTitleAst = now + rand(6000, 14000); }
    else drawTitleAsteroid(a);
  }

  // Sputnik flies left -> right every so often — drawn first so everything passes in front of it
  if (nextTitleFly === 0) nextTitleFly = now + rand(2000, 6000);
  if (!titleFly && now > nextTitleFly) titleFly = { x: -30, y: rand(30, H * 0.34), vx: rand(95, 140), last: now };
  if (titleFly) {
    titleFly.x += titleFly.vx * Math.min(0.05, (now - titleFly.last) / 1000); titleFly.last = now;
    if (titleFly.x > W + 40) { titleFly = null; nextTitleFly = now + rand(7000, 16000); }
    else drawSputnik(titleFly.x, titleFly.y, 7);
  }
  // asteroid vs Sputnik → both blow up; Sputnik returns on its next flyby (~7s)
  if (titleFly && titleAsteroid && Math.hypot(titleAsteroid.x - titleFly.x, titleAsteroid.y - titleFly.y) < titleAsteroid.r + 9) {
    titleBoom(titleFly.x, titleFly.y);
    titleFly = null; nextTitleFly = now + 7000;
    titleAsteroid = null; nextTitleAst = now + rand(6000, 14000);
  }

  // big red star + hammer & sickle, top centre (kept fully in frame)
  const sx = W * 0.5, sy = H * 0.12, sr = 76;
  starPath(sx, sy, sr, sr * 0.42);
  glowOn(24, "#ff3333"); ctx.fillStyle = "#d51616"; ctx.fill(); glowOff();
  if (hsReady) { const z = sr * 1.25; ctx.drawImage(hsImg, sx - z / 2, sy - z / 2, z, z); }


  // lander slowly orbiting the Moon (always in view, never behind)
  {
    const mx = TITLE_MOON.x, my = TITLE_MOON.y;
    const rx = 104, ry = 46, rot = -0.3;
    ctx.save();
    ctx.strokeStyle = "rgba(180,200,255,0.35)"; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.ellipse(mx, my, rx, ry, rot, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
    const o = orbitPos(mx, my, rx, ry, rot, -(now / 1000) * (2 * Math.PI / 20));   // 20s/orbit, front pass left->right
    // asteroid vs lander → it blows up and stays gone for 7s, then re-appears
    if (titleAsteroid && Math.hypot(titleAsteroid.x - o.x, titleAsteroid.y - o.y) < titleAsteroid.r + 13) {
      titleBoom(o.x, o.y);
      landerDeadUntil = now + 7000;
      titleAsteroid = null; nextTitleAst = now + rand(6000, 14000);
    }
    if (now >= landerDeadUntil) {
      ctx.save(); ctx.translate(o.x, o.y); ctx.rotate(o.tang - Math.PI / 2); ctx.scale(0.6, 0.6);   // faces the other way
      drawShipAt(0, 0);
      // continuous propulsion flame out the engine (local +y is the tail)
      const fl = 11 + 3 * Math.sin(now / 90);
      glowOn(10, "#ffae3a");
      ctx.beginPath(); ctx.moveTo(-3, 12); ctx.lineTo(0, 12 + fl); ctx.lineTo(3, 12); ctx.closePath();
      ctx.fillStyle = "#ffd24a"; ctx.fill();
      ctx.beginPath(); ctx.moveTo(-1.6, 12); ctx.lineTo(0, 12 + fl * 0.6); ctx.lineTo(1.6, 12); ctx.closePath();
      ctx.fillStyle = "#fff2b0"; ctx.fill();
      glowOff();
      ctx.restore();
    }
  }


  // one rocket climbing toward the Moon — the chosen rocket (Vostok or N1) alternates here too
  ctx.save();
  if (n1()) {
    // the N1 is much bigger, so it sits over on the LEFT, clear of the USSR map outline
    ctx.translate(W * 0.135, H * 0.40);
    ctx.rotate(0.4);
    ctx.scale(0.66, 0.66);
    drawN1({ gone: 0, nose: true, flame: true });
  } else {
    ctx.translate(W * 0.72, H * 0.135);
    ctx.rotate(0.5);
    ctx.scale(1.2, 1.2);
    drawRocket(true, 0);
  }
  ctx.restore();

  // traced USSR outline (neon red) with СССР spread out inside it — the centerpiece
  const mcx = W * 0.5, mcy = H * 0.50;
  if (ussrReady) {
    const iw = 510, ih = iw * 462 / 671;
    ctx.save();
    ctx.shadowColor = "#ff0033";
    for (const b of [16, 9, 4]) { ctx.shadowBlur = b; ctx.drawImage(ussrImg, mcx - iw / 2, mcy - ih / 2, iw, ih); }
    ctx.shadowBlur = 0;
    ctx.restore();
  }
  // СССР in white neon (moon-style), letters spread across the country on a slight arc
  ctx.font = "bold 60px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const ll = cccp();
  for (let i = 0; i < ll.length; i++) {
    const t = i / (ll.length - 1);
    const lx = mcx - 183 + t * 330;                 // shifted left so Р stays inside the border
    const ly = mcy - 16 + 20 * Math.sin(t * Math.PI); // shifted up, gentle dip over the red body
    const rot = Math.cos(t * Math.PI) * 0.2;          // follow the curve, globe-style
    ctx.save();
    ctx.translate(lx, ly); ctx.rotate(rot);
    glowOn(14, "#bcd4ff"); ctx.fillStyle = "#ffffff";
    ctx.fillText(ll[i], 0, 0);
    glowOff();
    ctx.restore();
  }

  // game title КЕДР + "lunar craft" (no LK-3)
  glowOn(10, "#ff0033");
  ctx.fillStyle = "#f4ece0";
  ctx.font = "bold 40px 'Courier New', monospace";
  ctx.fillText(tr("КЕДР"), W / 2, H * 0.79);
  glowOff();
  // "lunar craft" in soft gold (gentle glow, not heavy neon)
  const lcy = H * 0.79 + 24, lct = tr("лунный корабль");
  glowOn(5, "#ffb020");
  ctx.fillStyle = "#ffce5a";
  ctx.font = "bold 18px 'Courier New', monospace";
  ctx.fillText(lct, W / 2, lcy);
  glowOff();

  // blinking start prompt
  if (Math.floor(now / 600) % 2 === 0) {
    glowOn(6, "#bcd4ff");
    ctx.fillStyle = "#ffffff";
    ctx.font = "18px 'Courier New', monospace";
    ctx.fillText(tr("НАЖМИТЕ ВВОД"), W / 2, H * 0.90);
    glowOff();
  }

  // credit + year, lower-left
  ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
  ctx.fillStyle = "#f4ece0";
  ctx.font = "bold 16px 'Courier New', monospace";
  ctx.fillText(tr("СДЕЛАЛ AODHAN"), 22, H - 62);
  ctx.fillStyle = "#d81b1b";
  ctx.font = "bold 20px 'Courier New', monospace";
  ctx.fillText("MMXXVI", 22, H - 36);

  // explosion debris (drawn in front, on top of everything)
  for (let i = titleBits.length - 1; i >= 0; i--) {
    const p = titleBits[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.98; p.vy *= 0.98; p.life -= dt;
    if (p.life <= 0) { titleBits.splice(i, 1); continue; }
    glowOn(8, p.col); ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillStyle = p.col; ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
  }
  ctx.globalAlpha = 1; glowOff();

  ctx.restore();
}

function drawBanner() {
  ctx.save();
  glowOn(8);
  ctx.fillStyle = FG; ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "22px 'Courier New', monospace";
  ctx.fillText(msg, W / 2, H / 2 - 14);
  ctx.font = "15px 'Courier New', monospace";
  ctx.fillText(state === "landed" ? "PRESS ENTER TO LAUNCH" : "PRESS ENTER TO PLAY AGAIN", W / 2, H / 2 + 18);
  glowOff();
  ctx.restore();
}

newGame();
requestAnimationFrame(loop);
})();
